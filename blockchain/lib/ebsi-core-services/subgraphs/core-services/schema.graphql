###############################################################################
#                              DID Registry SC v5                             #
###############################################################################

enum ControllerStatus {
  ACTIVE
  REVOKED
  EXPIRED
}

enum VerificationMethodStatus {
  ACTIVE
  REVOKED
  EXPIRED
}

# Note: the following enum is case-sensitive
enum VerificationRelationshipPurpose {
  authentication
  assertionMethod
  keyAgreement
  capabilityInvocation
  capabilityDelegation
}

type DidDocument @entity(immutable: false) {
  # ID - Set to $did
  id: String!

  # Properties
  baseDocument: String!

  # Relationships
  controllerRelationships: [ControllerRelationship!]!
    @derivedFrom(field: "controlledDocument")
  verificationRelationships: [VerificationRelationship!]!
    @derivedFrom(field: "didDocument")
  verificationMethods: [VerificationMethod!]! @derivedFrom(field: "didDocument")
  events: [DidDocumentEvent!]! @derivedFrom(field: "didDocument")
  trustedIssuer: Issuer
}

type ControllerRelationship @entity(immutable: false) {
  # ID - Set to `${did}#${controller}`
  id: String!

  # Properties
  status: ControllerStatus!

  # Relationships
  controller: DidDocument!
  controlledDocument: DidDocument!
}

type VerificationRelationship @entity(immutable: false) {
  # ID - Set to `${verificationMethod.id}__${auto-incremented ID}`
  id: String!

  # Properties
  purpose: VerificationRelationshipPurpose!
  notBefore: BigInt!
  notAfter: BigInt!

  # Relationships
  didDocument: DidDocument!
  verificationMethod: VerificationMethod!
}

type VerificationMethod @entity(immutable: false) {
  # ID - Set to `${did}#${didFragment}`
  id: String!

  # Properties
  publicKey: Bytes!
  isSecp256k1: Boolean!
  status: VerificationMethodStatus!

  # Relationships
  didDocument: DidDocument!
  verificationRelationships: [VerificationRelationship!]!
    @derivedFrom(field: "verificationMethod")
}

type DidDocumentEvent @entity(immutable: true) {
  # ID - Set to `${transaction.hash.toHexString()}-${eventName}-${did}` (bytes)
  id: Bytes!

  # Properties
  signer: Bytes!
  blockNumber: BigInt!
  timestamp: BigInt!
  event: String!
  context: String # TODO: add more context + Make required
  txId: Bytes!

  # Relationships
  didDocument: DidDocument!
}

###############################################################################
#                               Timestamp SC v4                               #
###############################################################################

enum HashAlgorithmStatus {
  UNDEFINED
  ACTIVE
  REVOKED
}

type HashAlgorithm @entity(immutable: false) {
  # ID - Auto-incremented ID emitted by the smart contract
  id: String!

  # Properties
  ianaName: String!
  multiHash: String!
  oid: String!
  outputLength: BigInt!
  status: HashAlgorithmStatus!
}

# `TimestampedHash` is not immutable because `records` can be mutated
type TimestampedHash @entity(immutable: false) {
  # ID - # Set to `hashValue`
  id: Bytes!

  # Properties
  hashValue: Bytes!
  data: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  timestampedBy: Bytes! # Address
  transactionHash: Bytes!

  # Relationships
  hashAlgorithm: HashAlgorithm!
  records: [Record!]! # Only useful in the context of timestampVersionHashes
}

# Entity RecordVersion is not immutable because infos can be modified
type RecordVersion @entity(immutable: false) {
  # ID - Set to `record.id.concat(versionNumber)`
  id: Bytes!

  # Properties
  versionNumber: BigInt!
  infos: [Bytes!]!

  # Relationships
  record: Record!
  timestamps: [TimestampedHash!]!
}

type RecordOwner @entity(immutable: false) {
  # ID - Set to `record.id.concat(ownerId)`
  id: Bytes!

  # Properties
  ownerId: String!
  notBefore: BigInt!
  notAfter: BigInt!

  # Relationships
  record: Record!
}

type Record @entity(immutable: true) {
  # ID - Set to $recordId
  id: Bytes!

  # Relationships
  owners: [RecordOwner!]! @derivedFrom(field: "record")
  versions: [RecordVersion!]! @derivedFrom(field: "record")
}

###############################################################################
#                            Track and Trace SC v1                            #
###############################################################################

enum Source {
  BLOCK
  EXTERNAL
}

enum Permission {
  DELEGATE
  WRITE
  CREATOR
}

type Creator @entity(immutable: false) {
  # ID
  id: String!

  # Properties
  active: Boolean!

  # Relationships
  documents: [Document!]! @derivedFrom(field: "creator")
}

type Operator @entity(immutable: true) {
  # ID
  id: Bytes!

  # Relationships
  invitations: [Invitation!]! @derivedFrom(field: "subject")
}

type Document @entity(immutable: false) {
  # ID
  id: Bytes!

  # Properties
  timestamp: BigInt!
  source: Source!
  proof: Bytes!
  metadata: String!

  # Relationships
  creator: Creator!
  events: [DocumentEvent!]! @derivedFrom(field: "document")
  invitations: [Invitation!]! @derivedFrom(field: "document")
}

type Invitation @entity(immutable: false) {
  # ID - Set to document.id.concat(subject.id).concatI32(permission)
  id: Bytes!

  # Properties
  type: Permission!
  # TODO: would be good to link it to an entity if possible (not sure)
  grantedBy: Bytes!

  # Relationships
  document: Document!
  subject: Operator!
  parent: Invitation
  children: [Invitation!]! @derivedFrom(field: "parent")
}

# `DocumentEvent` is not immutable because it can be removed
type DocumentEvent @entity(immutable: false) {
  # ID - Set to document.id.concat(event.eventHash)
  id: Bytes!

  # Properties
  externalHash: String!
  hash: Bytes!
  timestamp: BigInt!
  source: Source!
  proof: Bytes!
  sender: Bytes!
  origin: String!
  metadata: String!

  # Relationships
  document: Document!
}

###############################################################################
#                       Trusted Contracts Registry SC v1                      #
###############################################################################

type ContractProxy @entity(immutable: true) {
  # ID - Set to proxyAddress
  id: Bytes!

  # Properties
  deployerAddress: Bytes! # Ethereum address
  initData: Bytes!
  isActive: Boolean!
  timestamp: BigInt!

  # Relationships
  deployerDidDocument: DidDocument!
  template: ContractTemplate!
  # deployerProxy is set if deployerAddress is another ContractProxy (supports recursion)
  deployerProxy: ContractProxy
  # Derived field: all proxies deployed by this proxy
  deployedProxies: [ContractProxy!]! @derivedFrom(field: "deployerProxy")
}

type ContractTemplate @entity(immutable: false) {
  # ID - Set to templateId
  id: Bytes!

  # Properties
  auditURI: String!
  beaconAddress: Bytes!
  contractHash: Bytes!
  initSelector: Bytes!
  isActive: Boolean!
  name: String!
  repoURI: String!
  storageLayoutHash: Bytes!
  version: String!

  # Relationships
  proxies: [ContractProxy!]! @derivedFrom(field: "template")
}

###############################################################################
#                        Trusted Issuers Registry SC v5                       #
###############################################################################

enum IssuerType {
  ROOT_TAO
  TAO
  TI
  REVOKED
}

# Entity Issuer is not immutable because didDocument can be assigned after the initialization
type Issuer @entity(immutable: false) {
  # ID - Set to $did
  id: String!

  # Relationships
  didDocument: DidDocument
  attributes: [IssuerAttribute!]! @derivedFrom(field: "issuer")
  proxies: [IssuerProxy!]! @derivedFrom(field: "issuer")
}

type IssuerAttribute @entity(immutable: false) {
  # ID - Set to $attributeId (as returned by the SC)
  id: Bytes!

  # Relationships
  issuer: Issuer!
  revisions: [IssuerAttributeRevision!]! @derivedFrom(field: "attribute")
  latestRevision: IssuerAttributeRevision!
}

type IssuerAttributeRevision @entity(immutable: true) {
  # ID - Set to $revisionId (as returned by the SC)
  id: Bytes!

  # Properties
  body: String!
  issuerType: IssuerType!
  tao: String! # TODO: reference Issuer
  rootTao: String! # TODO: reference Issuer
  timestamp: BigInt!

  # Relationships
  attribute: IssuerAttribute!
}

type IssuerProxy @entity(immutable: false) {
  # ID - Set to $proxyId (as returned by the SC)
  id: Bytes!

  # Properties
  data: String!

  # Relationships
  issuer: Issuer!
}

###############################################################################
#                       Trusted Policies Registry SC v3                       #
###############################################################################

type Policy @entity(immutable: false) {
  # ID - Set to policy name
  id: String!

  # Properties
  policyId: String!
  description: String!
  status: Boolean!
}

# Special entity that creates an easy way to retrieve a policy by its ID
type PolicyById @entity(immutable: true) {
  # ID - Set to policy ID
  id: String!

  # Relationships
  policy: Policy! # Policy
}

type PolicySubject @entity(immutable: false) {
  # ID - Set to subject Ethereum address
  id: Bytes!

  # Properties
  attributes: [String!]! # Unfortunately, we can't link it to a policy because there's no validation at the SC-level
}

###############################################################################
#                        Trusted Schemas Registry SC v3                       #
###############################################################################

type Schema @entity(immutable: true) {
  # ID - Set to schema ID
  id: Bytes!

  # Relationships
  revisions: [SchemaRevision!]! @derivedFrom(field: "schema")
}

type SchemaRevision @entity(immutable: false) {
  # ID - Set to `schema.id.concat(schemaRevisionId)`
  id: Bytes!

  # The actual revision ID from the smart contract
  schemaRevisionId: Bytes!

  # Properties
  content: String!

  # Schema name
  name: String

  # Current schema version
  version: String

  # Relationships
  schema: Schema!
  metadata: [SchemaMetadata!]! @derivedFrom(field: "revision")
}

type SchemaMetadata @entity(immutable: false) {
  # ID - Set to `revision.id.concat(metadataId)`
  id: Bytes!

  # The actual metadata ID from the smart contract
  metadataId: Bytes!

  # Properties
  content: String!
  # Relationships
  revision: SchemaRevision!
}

name: core-services

services:
  base:
    build:
      context: .
    image: 305472350643.dkr.ecr.eu-central-1.amazonaws.com/ebsi/core-services:${APP_VERSION:?missing version}
    labels:
      trivyignore: .trivyignore.yaml

  authorisation-api-v4:
    build:
      context: apis/authorisation-v4
      additional_contexts:
        core-services-base: "service:base"
      args:
        DOCKER_TAG: ${APP_VERSION:?missing version}
    image: 305472350643.dkr.ecr.eu-central-1.amazonaws.com/ebsi/authorisation-api-v4:${APP_VERSION:?missing version}
    labels:
      trivyignore: apis/authorisation-v4/.trivyignore.yaml


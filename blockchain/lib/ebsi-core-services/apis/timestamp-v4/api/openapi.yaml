  /timestamp/v4/timestamps/{timestampId}:
    get:
      operationId: get-timestamp
      summary: Get a timestamp
      description: Returns a timestamp identified by its ID.
      tags:
        - Timestamps
      parameters:
        - name: timestampId
          description: |
            Multihash of the sha256 of the original hash, encoded in multibase base64url.

            ```
            timestampId = multibase_base64url(multihash(sha256(original_hash)))
            ```

            Example: let's assume the original hash is a sha3-224 with the value
            `0xb2a8e000d1f25778cecf6b29fc0e7f811fb5f4a3a8230585e9056921`.

            It is stored in the smart contract with the timestamp ID
            `0xb2a8e000d1f25778cecf6b29fc0e7f811fb5f4a3a8230585e9056921`, which corresponds to the
            sha256 of the original hash.

            The multihash representation of
            `0xb2a8e000d1f25778cecf6b29fc0e7f811fb5f4a3a8230585e9056921` is
            `EiCPQS4deZG8y1FXlG9sW1vDfMbpulXYTkn0HWj2OWd61A` (encoded in base64url).

            At the API-level, the timestamp ID is then
            `uEiCPQS4deZG8y1FXlG9sW1vDfMbpulXYTkn0HWj2OWd61A`, i.e. it's the multibase base64url
            (prefix "u") encoded multihash.
          in: path
          schema:
            type: string
          examples:
            timestampId:
              description: Valid Pilot timestampId
              value: uEiCyzskEVXTNJVok_wI3wHty3LIJ3Apz_4HDocgAUtKGjg
          required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timestamp"
              examples:
                Success:
                  value:
                    hash: mE0BoK9lFXyC8pGx0XW6O/VuO8WBLMlS7KLx2bah55YH/VhaorawVrWFr/hMnbgBpR3vNSx8tA0A6MxtNmqNwjHaR
                    timestampedBy: "0xb8d511d80D9Cc1cFAfa79973edE37278d8B1ebd7"
                    blockNumber: 1880267
                    timestamp: "2021-08-30T15:20:16.000Z"
                    data: "0x7b2274657374223a3734327d"
                    transactionHash: "0x125988a9a6a9a02da35981dee230e1900088ef7fc5064c1f1d2225ef2d2c53e6"
        "400":
          description: Bad Request
          content:
            "application/problem+json":
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Invalid {timestampId} Parameter:
                  value:
                    title: Bad Request
                    status: 400
                    detail: The format of {timestampId} parameter is not valid
        "404":
          description: Not found
          content:
            "application/problem+json":
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Hash algorithm Not Found:
                  $ref: "#/components/examples/NotFound"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Internal Server Error:
                  $ref: "#/components/examples/InternalError"

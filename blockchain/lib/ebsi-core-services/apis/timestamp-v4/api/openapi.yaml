openapi: 3.1.0
info:
  title: Timestamp API v4
  version: 4.0.0
  description: |
    Timestamp API is an EBSI core service that enables interaction with the TimeStamp Smart Contract to:
    * timestamp hashes
    * support timestamping records and versions (including linking timestamps)
    * verify timestamps
  contact:
    name: EBSI Support - Service Desk
    url: https://ec.europa.eu/digital-building-blocks/tracker/plugins/servlet/desk/portal/11
  license:
    name: "EUPL-1.2"
    url: "https://joinup.ec.europa.eu/page/eupl-text-11-12"
paths:
  /timestamp/v4/hash-algorithms:
    get:
      operationId: get-hash-algorithms
      summary: List hash algorithms
      description: Returns a list of hash algorithms.
      tags:
        - Hash algorithms
      parameters:
        - in: query
          name: page[after]
          schema:
            type: string
          description: Cursor that points to the end of the page of data that has been returned.
        - schema:
            type: integer
          in: query
          name: page[size]
          description: Defines the maximum number of objects that may be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                    description: URI to hash algorithms
                  items:
                    type: array
                    description: List of hash algorithms
                    items:
                      type: object
                      properties:
                        hashAlgorithmId:
                          type: number
                          description: ID of the hash algorithm
                        href:
                          type: string
                          description: Link to the resource
                  total:
                    type: integer
                    description: Total number of items in a collection
                  pageSize:
                    type: integer
                    description: Number of items to be returned per page
                  links:
                    $ref: "#/components/schemas/Links"
              examples:
                Success:
                  value:
                    self: https://api-pilot.ebsi.eu/timestamp/v4/hash-algorithms?page[after]=3&page[size]=2
                    items:
                      - hashAlgorithmId: 4
                        href: https://api-pilot.ebsi.eu/timestamp/v4/hash-algorithms/4
                      - hashAlgorithmId: 5
                        href: https://api-pilot.ebsi.eu/timestamp/v4/hash-algorithms/5
                    total: 8
                    pageSize: 2
                    links:
                      first: https://api-pilot.ebsi.eu/timestamp/v4/hash-algorithms?page[after]=1&page[size]=2
                      prev: https://api-pilot.ebsi.eu/timestamp/v4/hash-algorithms?page[after]=2&page[size]=2
                      next: https://api-pilot.ebsi.eu/timestamp/v4/hash-algorithms?page[after]=4&page[size]=2
                      last: https://api-pilot.ebsi.eu/timestamp/v4/hash-algorithms?page[after]=42&page[size]=2
        "400":
          description: Bad Request Error
          content:
            "application/problem+json":
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Bad Paging Request:
                  value:
                    title: Bad Paging Request
                    status: 400
                    detail: PageSize should not be greater than 50
        "500":
          description: Internal Server Error
          content:
            "application/problem+json":
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Internal Server Error:
                  $ref: "#/components/examples/InternalError"
  /timestamp/v4/hash-algorithms/{hashAlgorithmId}:
    get:
      operationId: get-hash-algorithm
      summary: Get a hash algorithm
      description: Returns a hash algorithm identified by its ID.
      tags:
        - Hash algorithms
      parameters:
        - name: hashAlgorithmId
          in: path
          schema:
            type: string
          example: "0"
          required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashAlgorithm"
              examples:
                Success:
                  value:
                    outputLengthBits: 256

  /timestamp/v4/jsonrpc:
    post:
      operationId: post-jsonrpc
      summary: JSON-RPC API
      description: |
        The JSON-RPC API provides methods assisting the construction of blockchain transactions for
        Timestamp operations, and interaction with the ledger.
      tags:
        - JSON-RPC
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: |
          The body follows the
          [JSON-RPC 2.0 specification](https://www.jsonrpc.org/specification).

          It requires the following fields:

          - **jsonrpc**: must be exactly "2.0"
          - **method**: method to be invoked
          - **params**: method parameters
          - **id**: identifier established by the client

          ### API Methods

          #### insertHashAlgorithm

          Call to build an unsigned transaction to insert a new hash algorithm.
          Requires admin rights.

          Parameters:
          - **from**: Ethereum address of the signer
          - **outputLength**: hash output length (in bits)
          - **ianaName**: IANA name of the hash algorithm
          - **oid**: object identifier (OID)
          - **status**: status of the algorithm (1 = active, 2 = revoked)
          - **multiHash**: multihash name

          #### updateHashAlgorithm

          Call to build an unsigned transaction to update a hash algorithm.
          Requires admin rights.

          Parameters:
          - **from**: Ethereum address of the signer
          - **hashAlgorithmId**: ID of the hash algorithm to update
          - **outputLength**: hash output length (in bits)
          - **ianaName**: IANA name of the hash algorithm
          - **oid**: object identifier (OID)
          - **status**: status of the algorithm (1 = active, 2 = revoked)
          - **multiHash**: multihash name

          #### timestampHashes

          Call to build an unsigned transaction to timestamp hashes. It's possible to insert up to
          3 hashes in a single transaction.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **hashAlgorithmIds**: Array of hash algorithms ids used (up to 3)
          - **hashValues**: Array of hashes (up to 3)
          - **timestampData** (optional): Timestamp data. This field must be a JSON stringified and converted into hex string

          #### timestampRecordHashes

          Call to build an unsigned transaction to timestamp data and create a record of it with
          some info. It's possible to insert up to 3 hashes in a single transaction.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **hashAlgorithmIds**: Array of hash algorithms ids used (up to 3)
          - **hashValues**: Array of hashes (up to 3)
          - **timestampData** (optional): Timestamp data. This field must be a JSON stringified and converted into hex string
          - **versionInfo**: Version info. This field must be a JSON stringified and converted into hex string

          #### timestampVersionHashes

          Call to build an unsigned transaction to timestamp hashes and store them under the given
          record. It's possible to insert up to 3 hashes in a single transaction. This method can
          be called only by record owners.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **versionHash**: Version hash to update
          - **hashAlgorithmIds**: Array of hash algorithms ids used (up to 3)
          - **hashValues**: Array of hashes (up to 3)
          - **timestampData** (optional): Timestamp data. This field must be a JSON stringified and converted into hex string
          - **versionInfo**: Version info. This field must be a JSON stringified and converted into hex string

          #### insertRecordOwner

          Call to build an unsigned transaction to insert a record owner. This method can be called
          only by record owners.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **recordId**: Record ID to update
          - **ownerId**: Ethereum address of new owner
          - **notBefore**: Point in time when the owner becomes valid. It should be defined in epoch time.
          - **notAfter**: Point in time when the owner becomes invalid. It should be defined in epoch time. For indefinite time set 0.

          #### revokeRecordOwner

          Call to build an unsigned transaction to revoke a record owner. This method can be called
          only by record owners.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **recordId**: Record ID to update
          - **ownerId**: Ethereum address of the owner to revoke

          #### timestampRecordVersionHashes

          Call to build an unsigned transaction to timestamp data and link it to a new version of
          an existing record. It's possible to insert up to 3 hashes in a single transaction. This
          method can be called only by record owners.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **recordId**: Record ID to update
          - **hashAlgorithmIds**: Array of hash algorithms ids used (up to 3)
          - **hashValues**: Array of hashes (up to 3)
          - **timestampData** (optional): Timestamp data. This field must be a JSON stringified and converted into hex string
          - **versionInfo**: Version info. This field must be a JSON stringified and converted into hex string

          #### appendRecordVersionHashes

          Call to build an unsigned transaction to timestamp data and link it to an existing
          version of a record. It's possible to insert up to 3 hashes in a single transaction. This
          method can be called only by record owners.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **recordId**: Record ID to update
          - **versionId**: Version ID to update
          - **hashAlgorithmIds**: Array of hash algorithms ids used (up to 3)
          - **hashValues**: Array of hashes (up to 3)
          - **timestampData** (optional): Timestamp data. This field must be a JSON stringified and converted into hex string
          - **versionInfo**: Version info. This field must be a JSON stringified and converted into hex string

          #### detachRecordVersionHash

          Call to build an unsigned transaction to detach a hash from the timestamps ids of a
          version of an existing record. This method can be called only by record owners.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **recordId**: Record ID to update
          - **versionId**: Version ID to update
          - **hashValue**: Hash value to detach

          #### insertRecordVersionInfo

          Call to build an unsigned transaction to to insert new info to a version of an existing
          record. This method can be called only by record owners.
          Requires an access token with "timestamp_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **recordId**: Record ID to update
          - **versionId**: Version ID to update
          - **versionInfo**: Version info. This field must be a JSON stringified and converted into hex string

          #### sendSignedTransaction

          Call to send a signed transaction to the blockchain.
          Requires an access token with "timestamp_write" scope.
        content:
          application/json:
            schema:
              required:
                - jsonrpc
                - id
                - method
                - params
              type: object
              properties:
                jsonrpc:
                  description: Must be exactly "2.0"
                  type: string
                method:
                  description: Method that needs to be invoked
                  type: string
                params:
                  description: Array of parameters
                  type: array
                  items:
                    type: object
                id:
                  description: Identifier established by the client
                  type: integer
                  example: 1
            examples:
              Build tx to insertHashAlgorithm:
                value:
                  jsonrpc: "2.0"
                  method: insertHashAlgorithm
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      outputLength: 256
                      ianaName: sha-256
                      oid: "2.16.840.1.101.3.4.2.1"
                      status: 1
                      multiHash: sha2-256
                  id: 1
              Build tx to updateHashAlgorithm:
                value:
                  jsonrpc: "2.0"
                  method: updateHashAlgorithm
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      hashAlgorithmId: 3
                      outputLength: 256
                      ianaName: sha-256
                      oid: "2.16.840.1.101.3.4.2.1"
                      status: 2
                      multiHash: sha2-256
                  id: 1
              Build tx to timestampHashes:
                value:
                  jsonrpc: "2.0"
                  method: timestampHashes
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      hashAlgorithmIds:
                        - 0
                      hashValues:
                        - "0x1234567890123456789012345678901234567890123456789012345678901234"
                      timestampData:
                        - "0x7b2274657374223a3834327d"
                  id: 1
              Build tx to timestampRecordHashes:
                value:
                  jsonrpc: "2.0"
                  method: timestampRecordHashes
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      hashAlgorithmIds:
                        - 0
                      hashValues:
                        - "0x1234567890123456789012345678901234567890123456789012345678901234"
                      timestampData:
                        - "0x7b2274657374223a3834327d"
                      versionInfo: "0x7b2274657374223a34327d"
                  id: 1
              Build tx to timestampVersionHashes:
                value:
                  jsonrpc: "2.0"
                  method: timestampVersionHashes
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      versionHash: "0x1234567890123456789012345678901234567890123456789012345678901234"
                      hashAlgorithmIds:
                        - 0
                      hashValues:
                        - "0x1234567890123456789012345678901234567890123456789012345678901234"
                      timestampData:
                        - "0x7b2274657374223a3834327d"
                      versionInfo: "0x7b2274657374223a34327d"
                  id: 1
              Build tx to insertRecordOwner:
                value:
                  jsonrpc: "2.0"
                  method: insertRecordOwner
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      recordId: "0xec45567890123456789012345678901fa456789012345678901234567890abfe"
                      ownerId: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      notBefore: 1606387195
                      notAfter: 0
                  id: 1
              Build tx to revokeRecordOwner:
                value:
                  jsonrpc: "2.0"
                  method: revokeRecordOwner
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      recordId: "0xec45567890123456789012345678901fa456789012345678901234567890abfe"
                      ownerId: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                  id: 1
              Build tx to timestampRecordVersionHashes:
                value:
                  jsonrpc: "2.0"
                  method: timestampRecordVersionHashes
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      recordId: "0xec45567890123456789012345678901fa456789012345678901234567890abfe"
                      hashAlgorithmIds:
                        - 0
                      hashValues:
                        - "0x1234567890123456789012345678901234567890123456789012345678901234"
                      timestampData:
                        - "0x7b2274657374223a3834327d"
                      versionInfo: "0x7b2274657374223a34327d"
                  id: 1
              Build tx to appendRecordVersionHashes:
                value:
                  jsonrpc: "2.0"
                  method: appendRecordVersionHashes
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      recordId: "0xec45567890123456789012345678901fa456789012345678901234567890abfe"
                      versionId: 0
                      hashAlgorithmIds:
                        - 0
                      hashValues:
                        - "0x1234567890123456789012345678901234567890123456789012345678901234"
                      timestampData:
                        - "0x7b2274657374223a3834327d"
                      versionInfo: "0x7b2274657374223a34327d"
                  id: 1
              Build tx to detachRecordVersionHash:
                value:
                  jsonrpc: "2.0"
                  method: detachRecordVersionHash
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      recordId: "0xec45567890123456789012345678901fa456789012345678901234567890abfe"
                      versionId: 0
                      hashValue: "0x1234567890123456789012345678901234567890123456789012345678901234"
                  id: 1
              Build tx to insertRecordVersionInfo:
                value:
                  jsonrpc: "2.0"
                  method: insertRecordVersionInfo
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      recordId: "0xec45567890123456789012345678901fa456789012345678901234567890abfe"
                      versionId: 0
                      versionInfo: "0x7b2274657374223a34327d"
                  id: 1
              Send Transaction:
                description: Call to send a signed transaction to the blockchain.
                value:
                  jsonrpc: "2.0"
                  method: sendSignedTransaction
                  params:
                    - protocol: eth
                      unsignedTransaction:
                        from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                        to: "0xFde86148db58f57787C06BeAf63a9c3f789357b3"
                        data: "0x0000..."
                        nonce: "0x00"
                        chainId: "0x1b3b"
                        gasLimit: "0x10000"
                        gasPrice: "0x00"
                        value: "0x00"
                      r: "0x..."
                      s: "0x..."
                      v: "0x..."
                      signedRawTransaction: "--- signed raw transaction ---"
                  id: 1
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
              examples:
                Build tx:
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result:
                      from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      to: "0xFde86148db58f57787C06BeAf63a9c3f789357b3"
                      data: "0x0000..."
                      nonce: "0x00"
                      chainId: "0x1b3b"
                      gasLimit: "0x10000"
                      gasPrice: "0x00"
                      value: "0x00"
                Send Transaction:
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result: "0xe670ec64341771606e55d6b4ca35a1a6b75ee3d5145a99d05921026d1527331"
        "400":
          description: Bad request
          content:
            "application/problem+json":
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Bad Request:
                  $ref: "#/components/examples/BadRequest"
components:
  schemas:
    ProblemDetails:
      title: Problem Details
      description: A [Problem Details](https://datatracker.ietf.org/doc/html/rfc7807) object.
      type: object
      properties:
        type:
          type: string
          format: uri
          description: |
            An absolute URI that identifies the problem type. When dereferenced,
            it SHOULD provide human-readable documentation for the problem type.
          default: "about:blank"
        title:
          type: string
          description: |
            A short summary of the problem type.
          example: Internal Server Error
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence of the problem.
          minimum: 400
          maximum: 600
          example: 500
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the problem.
          example: Connection timeout
        instance:
          type: string
          format: uri
          description: |
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
    JsonRpcResponse:
      title: JSON-RPC Response
      type: object
      properties:
        jsonrpc:
          description: Must be exactly "2.0"
          type: string
        id:
          description: Same identifier established by the client in the call
          type: integer
        result:
          description: Result of the call
          oneOf:
            - type: object
            - type: string
    HashAlgorithm:
      title: Hash algorithm
      type: object
      properties:
        outputLengthBits:
          type: number
          description: Hash algorithm output length in bits. 0 if the output length if variable.
        ianaName:
          type: string
          description: Hash algorithm IANA name.
        oid:
          type: string
          description: Object identifier.
        status:
          type: string
          description: Status of the algorithm (active, revoked).
        multiHash:
          type: string
          description: Multihash name
    Record:
      title: Record
      type: object
      properties:
        ownerIds:
          description: A list of record owners/controllers
          type: array
          items:
            type: string
        revokedOwnerIds:
          description: A list of revoked owners/controllers
          type: array
          items:
            type: string
        firstVersionTimestamps:
          description: A list of the first version timestamps
          type: array
          items:
            type: string
        lastVersionTimestamps:
          description: A list of the last version timestamps
          type: array
          items:
            type: string
        totalVersions:
          description: A total number of versions
          type: number
    Version:
      title: Version
      type: object
      properties:
        hashes:
          type: array
          items:
            type: string
          description: A list of timestamped version hashes
        info:
          type: array
          items:
            type: object
          description: A list of info objects (should be JSON-LD)
    Timestamp:
      title: Timestamp information
      type: object
      properties:
        hash:
          description: Timestamped hash (multi-hash, base64 multi-encoded)
          type: string
        timestampedBy:
          description: Address of the transaction signer that timestamped the information.
          type: string
        blockNumber:
          description: Number of the block in which the hash has been timestamped.
          type: integer
        timestamp:
          description: Timestamp in ISO 8601 format
          type: string
        transactionHash:
          description: Hash of the transaction/transaction id.
          type: string
        data:
          description: Additional timestamp data (bytes, serialized JSON-LD)
          type: string
    Links:
      title: Links
      description: Links model used for pagination.
      type: object
      properties:
        last:
          type: string
          description: URI of the last page
        prev:
          type: string
          description: URI of the previous page
        next:
          type: string
          description: URI of the next page
        first:
          type: string
          description: URI of the first page
  examples:
    BadRequest:
      value:
        title: Bad Request
        status: 400
        detail: Bad request
    NotFound:
      value:
        title: Not found
        status: 404
        detail: Not found
    InternalError:
      value:
        title: Internal error
        status: 500
        detail: Internal error
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
  - url: http://localhost
    description: Local Computer Environment
  - url: https://api-test.ebsi.eu
    description: EBSI Test Environment
  - url: https://api-pilot.ebsi.eu
    description: EBSI Pilot Environment
  - url: https://api-conformance.ebsi.eu
    description: EBSI Conformance Environment

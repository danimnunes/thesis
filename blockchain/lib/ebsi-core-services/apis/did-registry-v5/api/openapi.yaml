  /did-registry/v5/identifiers/{did}:
    get:
      tags:
        - DID documents
      summary: Get a DID document
      description: Returns the DID document corresponding to the DID.
      operationId: get-identifier
      parameters:
        - in: path
          name: did
          description: A DID to be resolved.
          required: true
          schema:
            type: string
          examples:
            DID:
              value: did:ebsi:zZeKyEJfUTGwajhNyNX928z
        - in: query
          name: valid-at
          description: |
            This option is used to get a the version in the past
            of a DID document. It must be a date in ISO-8601 format
          schema:
            type: string
      responses:
        "200":
          description: Success. A user wallet gets DID resolution.
          content:
            application/did+ld+json:
              schema:
                $ref: "#/components/schemas/DIDDocument"
              examples:
                Success:
                  value:
                    "@context":
                      - https://www.w3.org/ns/did/v1
                      - https://w3id.org/security/suites/jws-2020/v1
                    id: did:ebsi:zZeKyEJfUTGwajhNyNX928z
                    controller:
                      - did:ebsi:zZeKyEJfUTGwajhNyNX928z
                    verificationMethod:
                      - id: did:ebsi:zZeKyEJfUTGwajhNyNX928z#RqnJsdrEXgSMJgCdlxFGya2oLmVEP1zz0Jo-VMFqq6E
                        type: JsonWebKey2020
                        controller: did:ebsi:zZeKyEJfUTGwajhNyNX928z
                        publicKeyJwk:
                          kty: EC
                          crv: secp256k1
                          x: wBmAchcZfv7IIWzLdSPysdT_33r02KH18nJM_r01pig
                          y: MABWTgJIKuObHLi8G8ta_OoUpqwBShoKlbT2_PcEybI
                      - id: did:ebsi:zZeKyEJfUTGwajhNyNX928z#So1HIRt0Kqf0_BSwqv4VMNgkax3mCF9IjcQJwMnB3bs
                        type: JsonWebKey2020
                        controller: did:ebsi:zZeKyEJfUTGwajhNyNX928z
                        publicKeyJwk:
                          kty: EC
                          x: AfLzzSLO_rH1n7fIJsGS9AUyZXCql78npwshtYE0Rf4
                          y: vVoDE_-A4Yptu0oelJD2OYdTARMF52lSQXc2IqiwIMQ
                          crv: P-256
                    authentication:
                      - did:ebsi:zZeKyEJfUTGwajhNyNX928z#RqnJsdrEXgSMJgCdlxFGya2oLmVEP1zz0Jo-VMFqq6E
                      - did:ebsi:zZeKyEJfUTGwajhNyNX928z#So1HIRt0Kqf0_BSwqv4VMNgkax3mCF9IjcQJwMnB3bs
                    assertionMethod:
                      - did:ebsi:zZeKyEJfUTGwajhNyNX928z#So1HIRt0Kqf0_BSwqv4VMNgkax3mCF9IjcQJwMnB3bs
                    capabilityInvocation:
                      - did:ebsi:zZeKyEJfUTGwajhNyNX928z#RqnJsdrEXgSMJgCdlxFGya2oLmVEP1zz0Jo-VMFqq6E
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Invalid {did} Parameter:
                  value:
                    title: Bad Request
                    status: 400
                    detail: The format of {did} parameter is not valid
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:

              Build tx to addVerificationMethod (for ES256K algorithm):
                value:
                  jsonrpc: "2.0"
                  method: addVerificationMethod
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      did: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      vMethodId: axZAOKbj-YyMiIN2CRLCwPjSCgMwhBwCVNgEbOl3QJY
                      publicKey: "0x04e98e599b648b3548468bc8da31937f11980159fd2c1af555b5db9cfab7b4095517d7094c829bb7d5f876ba2054ace767ca66f22df341bc6ad032f865cadb30cb"
                      isSecp256k1: true
                  id: 185
              Build tx to addVerificationMethod (for algorithm different to ES256K):
                value:
                  jsonrpc: "2.0"
                  method: addVerificationMethod
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      did: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      vMethodId: HntX1odLlp_5w-W18Yk6OhR5dNNHsugaM2lOuAHDpmU
                      publicKey: "0x7b226b7479223a224543222c2278223a227839756d53644855304a6458727a7155326130533569627034625a4c467877364e6a6f506b637035513173222c2279223a2276537767487062736c773757433472506a30676d706c324661504e337073414a6c397a4c39775963767a73222c22637276223a22502d323536227d"
                      isSecp256k1: false
                  id: 575

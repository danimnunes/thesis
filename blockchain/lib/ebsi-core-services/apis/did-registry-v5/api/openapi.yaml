                        href: https://api-pilot.ebsi.eu/did-registry/v5/identifiers/did:ebsi:zZ91pGjbnuQmEf3RJfi5K1t
                      - did: did:ebsi:ztnQABC7mzp2yUq2uzLYEqJ

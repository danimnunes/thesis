  /did-registry/v5/identifiers/{did}/actions:
    post:
      tags:
        - DID documents
      summary: Perform actions in DID
      description: Perform actions in DID like checking a controller
      operationId: post-actions
      parameters:
        - in: path
          name: did
          description: DID related to the action.
          required: true
          schema:
            type: string
          examples:
            DID:
              value: did:ebsi:zZeKyEJfUTGwajhNyNX928z
      requestBody:
        description: |
          The body follows the
          [JSON-RPC 2.0 specification](https://www.jsonrpc.org/specification).

          It requires the following fields:

          - **jsonrpc**: must be exactly "2.0"
          - **method**: method to be invoked
          - **params**: method parameters
          - **id**: identifier established by the client
        content:
          application/json:
            schema:
              required:
                - jsonrpc
                - id
                - method
                - params
              type: object
              properties:
                jsonrpc:
                  description: Must be exactly "2.0"
                  type: string
                method:
                  description: Method that needs to be invoked
                  type: string
                params:
                  description: Array of parameters
                  type: array
                  items:
                    type: string
                id:
                  description: Identifier established by the client
                  type: integer
                  example: 1
            examples:
              checkController:
                value:
                  jsonrpc: "2.0"
                  method: "checkController"
                  params: ["0x6C286fA9e15Df7f245B8A751d4e9a0FA4C43E8b6"]
                  id: 1
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                title: JSON-RPC Response
                type: object
                properties:
                  jsonrpc:
                    description: Must be exactly "2.0"
                    type: string
                  id:
                    description: Same identifier established by the client in the call
                    type: integer
                  result:
                    description: Result of the call
                    oneOf:
                      - type: object
                      - type: string
                      - type: boolean
              examples:
                checkController:
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result: true
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Invalid {did} Parameter:
                  value:
                    title: Bad Request
                    status: 400
                    detail: The format of {did} parameter is not valid
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Internal Server Error:
                  $ref: "#/components/examples/InternalError"
  /did-registry/v5/abi:
    get:
      operationId: get-abi
      summary: Get ABI
      description: Returns the ABI of DID Registry SC v5.
      tags:
        - ABI
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                description: The ABI of DID Registry SC v5.
  /did-registry/v5/jsonrpc:
    post:
      operationId: post-jsonrpc
      tags:
        - JSON-RPC
      summary: JSON-RPC API
      description: |
        The JSON-RPC API provides methods assisting the construction of blockchain transactions and
        interaction with the ledger, i.e. write operation on ledger.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: |
          The body follows the
          [JSON-RPC 2.0 specification](https://www.jsonrpc.org/specification).

          It requires the following fields:

          - **jsonrpc**: must be exactly "2.0"
          - **method**: method to be invoked
          - **params**: method parameters
          - **id**: identifier established by the client

          ### API Methods

          #### insertDidDocument

          Call to build an unsigned transaction to insert a new DID document.
          Requires an access token with "didr_invite" or "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: DID to insert. It must be for a legal entity (DID v1)
          - **baseDocument**: JSON string containing the @context of the DID document
          - **vMethodId**: Verification method ID. Recommended: thumbprint of the public key JWK.
          - **publicKey**: Public key for secp256k1 in uncompressed format prefixed with "0x04"
          - **isSecp256k1**: It must be true
          - **notBefore**: capability invocation is valid from this time
          - **notAfter**: expiration of the capability invocation

          #### updateBaseDocument

          Call to build an unsigned transaction to update the base document
          of an existing DID.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **baseDocument**: JSON string containing the @context of the DID document

          #### addService

          Call to build an unsigned transaction to create a service for an existing DID.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **service**: JSON string containing the service schema that needs to be added

          #### revokeService

          Call to build an unsigned transaction to revoke a service from a DID by a service id.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **serviceId**: Identifier of the service

          #### addController

          Call to build an unsigned transaction to add a new controller
          to an existing DID document.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **controller**: DID of the new controller

          #### revokeController

          Call to build an unsigned transaction to revoke a controller
          from a DID document.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **controller**: DID of controller to revoke

          #### addVerificationMethod

          Call to build an unsigned transaction to add a verification method. Please note that this verification method will only appear in the DID document after adding a verification relationship.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **vMethodId**: New verification method ID. Recommended: thumbprint of the public key JWK.
          - **isSecp256k1**: Boolean defining if the public key is for secp256k1 curve or not
          - **publicKey**: Public key as hex string. For an ES256K key, it must be in uncompressed
            format prefixed with "0x04". For other algorithms, it must be the JWK transformed to
            string and then to hex format.

          #### addVerificationRelationship

          Call to build an unsigned transaction to add a verification relationship.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **name**: Name of the verification relationship
          - **vMethodId**: Reference to the verification method
          - **notBefore**: Verification relationship is valid from this time
          - **notAfter**: Expiration of the verification relationship

          #### revokeVerificationMethod

          Call to build an unsigned transaction to revoke a verification method.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **vMethodId**: Reference to the verification method
          - **notAfter**: Date on which the revocation takes effect. It must be in the past

          #### expireVerificationMethod

          Call to build an unsigned transaction to expire a verification method.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: Existing DID
          - **vMethodId**: Reference to the verification method
          - **notAfter**: New expiration date. It must be in the future

          #### rollVerificationMethod

          Call to build an unsigned transaction to roll a verification method.
          Requires an access token with "didr_write" scope.

          Parameters:
          - **from**: Ethereum address of the signer
          - **args**: Roll arguments. JSON with the following fields:
            - **did**: Existing DID
            - **vMethodId**: New verification method ID. Recommended: thumbprint of the public key JWK.
            - **isSecp256k1**: Boolean defining if the public key is for secp256k1 curve or not
            - **publicKey**: Public key as hex string. For an ES256K key, it must be in uncompressed
              format prefixed with "0x04". For other algorithms, it must be the JWK transformed to
              string and then to hex format.
            - **notBefore**: Verification relationship is valid from this time
            - **notAfter**: Expiration of the verification relationship
            - **oldVMethodId**: Old verification method id that will be rolled
            - **duration**: Duration of the period of transition. During this period both
              verification methods will be valid.

          #### sendSignedTransaction

          Call to send a signed transaction to the blockchain.
          Requires an access token with "didr_invite" or "didr_write" scope.
        content:
          application/json:
            schema:
              required:
                - jsonrpc
                - id
                - method
                - params
              type: object
              properties:
                jsonrpc:
                  description: Must be exactly "2.0"
                  type: string
                method:
                  description: Method that needs to be invoked
                  type: string
                params:
                  description: Array of parameters
                  type: array
                  items:
                    type: object
                id:
                  description: Identifier established by the client
                  type: integer
                  example: 1
            examples:
              Build tx to insertDidDocument:
                value:
                  jsonrpc: "2.0"
                  method: insertDidDocument
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      did: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      baseDocument: '{"@context":["https://www.w3.org/ns/did/v1","https://w3id.org/security/suites/jws-2020/v1"]}'
                      vMethodId: axZAOKbj-YyMiIN2CRLCwPjSCgMwhBwCVNgEbOl3QJY
                      publicKey: "0x04e98e599b648b3548468bc8da31937f11980159fd2c1af555b5db9cfab7b4095517d7094c829bb7d5f876ba2054ace767ca66f22df341bc6ad032f865cadb30cb"
                      isSecp256k1: true
                      notBefore: 1676474669
                      notAfter: 1830869669
                  id: 474
              Build tx to updateBaseDocument:
                value:
                  jsonrpc: "2.0"
                  method: updateBaseDocument
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      did: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      baseDocument: '{"@context":["https://www.w3.org/ns/did/v1","https://w3id.org/security/suites/jws-2020/v1"]}'
                  id: 524
              Build tx to addService:
                value:
                  jsonrpc: "2.0"
                  method: addService
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      did: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      service: '{"id":"1","type":"CredentialRegistry","serviceEndpoint":{"registries":["https://registry.example.com/{credentialSubject.id}","https://identity.foundation/vcs/{credentialSubject.id}"],"byId":"/vc/{id}","byType":"/type/{type}"}}'
                  id: 524
              Build tx to revokeService:
                value:
                  jsonrpc: "2.0"
                  method: revokeService
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      did: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      serviceId: "1"
                  id: 524
              Build tx to addController:
                value:
                  jsonrpc: "2.0"
                  method: addController
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      did: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      controller: did:ebsi:zZviptEhFN1r2u18hhi7Hof
                  id: 757
              Build tx to revokeController:
                value:
                  jsonrpc: "2.0"
                  method: revokeController
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      did: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      controller: did:ebsi:zZviptEhFN1r2u18hhi7Hof

openapi: 3.1.0
info:
  title: DID Registry API v5
  description: |
    The DID Registry (DIDR) is an EBSI core service providing the capabilities of registering, managing and resolving EBSI Decentralised Identifiers (DIDs) of the did:ebsi DID method.

    It enables consumers to interact with the DID Registry Smart Contract to:
    - Insert a DID/DID document
    - Update a DID document
    - Add a service
    - Revoke a service
    - Revoke a DID/DID Controlling keys
    - Resolve a DID (and obtain a DID document)

    For more information see:
    * [How to register a DID document](https://hub.ebsi.eu/vc-framework/guidelines/didr)
    * [CLI Tool page](https://hub.ebsi.eu/tools/cli): Test the capabilities using the EBSI CLI tool
  version: 5.0.0
  contact:
    name: EBSI Support - Service Desk
    url: https://ec.europa.eu/digital-building-blocks/tracker/plugins/servlet/desk/portal/11
  license:
    name: EUPL-1.2
    url: https://joinup.ec.europa.eu/page/eupl-text-11-12
paths:
  /did-registry/v5/identifiers:
    get:
      tags:
        - DID documents
      summary: List identifiers
      description: Returns a list of identifiers.
      operationId: get-identifiers
      parameters:
        - in: query
          name: page[after]
          schema:
            type: string
          description: Cursor that points to the end of the page of data that has been returned.
        - in: query
          name: page[size]
          description: Defines the maximum number of objects that may be returned.
          schema:
            type: integer
        - in: query
          name: controller
          description: Filter by controller DID.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                    description: Absolute path to the collection (consult)
                  items:
                    type: array
                    description: List of identifiers
                    items:
                      type: object
                      properties:
                        did:
                          type: string
                          description: A unique record id = DID User
                        href:
                          type: string
                          description: Link to the resource
                  total:
                    type: integer
                    description: Total number of items across all pages.
                  pageSize:
                    type: integer
                    description: |
                      Maximum number of items per page. For the last page, its value should be
                      independent of the number of actually returned items.
                  links:
                    $ref: "#/components/schemas/Links"
              examples:
                Success:
                  value:
                    self: https://api-pilot.ebsi.eu/did-registry/v5/identifiers?page[after]=1&page[size]=10
                    items:
                      - did: did:ebsi:zxAFkP2dnB5oL2A5iaaK5K3
                        href: https://api-pilot.ebsi.eu/did-registry/v5/identifiers/did:ebsi:zxAFkP2dnB5oL2A5iaaK5K3
                      - did: did:ebsi:zz5f4mD24zdq5rAshHd9R57

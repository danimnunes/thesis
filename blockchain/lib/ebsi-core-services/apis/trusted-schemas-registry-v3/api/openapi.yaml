    get:
      operationId: get-schema-revisions
      summary: List a schema's revisions
      description: Returns a list of revisions of a specific schema.
      tags:
        - Schemas
      parameters:
        - in: path
          name: schemaId
          schema:
            type: string
          examples:
            schemaId:
              description: Valid Pilot schemaId
              value: zDpWGUBenmqXzurskry9Nsk6vq2R8thh9VSeoRqguoyMD
          required: true
        - in: query
          name: page[after]
          schema:
            type: string
          description: Cursor that points to the end of the page of data that has been returned.
        - schema:
            type: integer
          in: query
          name: page[size]
          description: Defines the maximum number of objects that may be returned.
        - in: query
          name: valid-at
          schema:
            type: string
          description: ISO-8601 date. Only revisions valid at this date will be returned. Requires "version" to be "deprecated".
        - in: query
          name: version
          description: |
            Version of the endpoint to use. Defaults to the latest version.
          required: false
          schema:
            type: string
            enum:
              - deprecated
              - latest
          example: "deprecated"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                    description: Absolute path to the collection.
                  items:
                    type: array
                    description: List of schemas
                    items:
                      title: Schema revisions links
                      description: Links to schema revisions as returned by the REST APIs.
                      type: object
                      properties:

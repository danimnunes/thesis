openapi: 3.1.0
info:
  title: Trusted Schemas Registry API v3
  version: 3.0.0
  description: |
    The Trusted Schemas Registry (TSR) API is a core EBSI service that enables interaction with the Trusted Schemas Registry Smart Contract
    to:
    - register a new schema
    - update a registered schema
    - read and validate registered schemas

    The EBSI TSR is a domain-specific registry service focused on registering only data models and ontologies. The registry is agnostic to any type of schema, supporting whatever scheme the consumer needs to anchor, whether it be JSON, JSON-LD, XML, or other formats.

    The TSR API is a microservice hosted on the EBSI infrastructure.
  contact:
    name: EBSI Support - Service Desk
    url: https://ec.europa.eu/digital-building-blocks/tracker/plugins/servlet/desk/portal/11
  license:
    name: EUPL-1.2
    url: https://joinup.ec.europa.eu/page/eupl-text-11-12
paths:
  /trusted-schemas-registry/v3/schemas:
    get:
      operationId: get-schemas
      summary: List schemas
      description: Returns a list of schemas.
      tags:
        - Schemas
      parameters:
        - in: query
          name: page[after]
          schema:
            type: string
          description: Cursor that points to the end of the page of data that has been returned.
        - schema:
            type: integer
          in: query
          name: page[size]
          description: Defines the maximum number of objects that may be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                    description: Absolute path to the collection.
                  items:
                    type: array
                    description: List of schemas
                    items:
                      title: Schema links
                      description: Links to schemas as returned by the REST APIs.
                      type: object
                      properties:
                        schemaId:
                          type: string
                          description: Unique schema ID, encoded in multibase base58btc.
                        href:
                          type: string
                          description: Link to the resource.
                  total:
                    type: integer
                    description: Total number of items across all pages.
                  pageSize:
                    type: integer
                    description: Number of items to be returned per page.
                  links:
                    $ref: "#/components/schemas/Links"
              examples:
                Success:
                  value:
                    self: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas?page[after]=1&page[size]=10
                    items:
                      - schemaId: "z3kRpVjUFj4Bq8qHRENUHiZrVF5VgMBUe7biEafp1wf2J"
                        href: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas/z3kRpVjUFj4Bq8qHRENUHiZrVF5VgMBUe7biEafp1wf2J
                      - schemaId: "zkVjiLUWHoDtRie9iRAV1oDfjY7onVTEdzzqdXajvBa"
                        href: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas/zkVjiLUWHoDtRie9iRAV1oDfjY7onVTEdzzqdXajvBa
                      - schemaId: "zArZLLNBiR4puGn7xbvnbuwTTUMpwuLTD2rSEHYmFc"
                        href: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas/zArZLLNBiR4puGn7xbvnbuwTTUMpwuLTD2rSEHYmFc
                      - schemaId: zDpWGUBenmqXzurskry9Nsk6vq2R8thh9VSeoRqguoyMD
                        href: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas/zDpWGUBenmqXzurskry9Nsk6vq2R8thh9VSeoRqguoyMD
                    total: 4
                    pageSize: 10
                    links:
                      first: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas?page[after]=1&page[size]=10
                      prev: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas?page[after]=1&page[size]=10
                      next: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas?page[after]=1&page[size]=10
                      last: https://api-pilot.ebsi.eu/trusted-schemas-registry/v3/schemas?page[after]=1&page[size]=10
        "400":
          description: Bad Request Error
          content:
            application/problem+json:

        "400":
          description: JSON-RPC Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
              examples:
                Parse error:
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    error:

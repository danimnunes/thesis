                      message: "Parse error"
components:
  schemas:
    JsonRpcPayload:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          description: Must be exactly "2.0"
          type: string
          enum: ["2.0"]
        method:
          description: Besu JSON-RPC native method to be invoked
          type: string
        params:
          description: Array of parameters
          type: array
          items:
            oneOf:
              - type: boolean
              - type: object
              - type: string
        id:
          description: Identifier established by the client
          oneOf:
            - type: number
            - type: string
          examples: [1, "1"]
    JsonRpcBatchPayload:
      type: array
      items:
        $ref: "#/components/schemas/JsonRpcPayload"
    JsonRpcRequest:
      title: JSON-RPC Request
      oneOf:
        - $ref: "#/components/schemas/JsonRpcPayload"
        - $ref: "#/components/schemas/JsonRpcBatchPayload"
    JsonRpcResult:
      title: JSON-RPC Result
      type: object
      required:
        - jsonrpc
        - id
        - result
      properties:
        jsonrpc:
          description: Must be exactly "2.0"
          type: string
          enum: ["2.0"]
        id:
          description: Same identifier established by the client in the call
          oneOf:
            - type: number
            - type: string
          examples: [1, "1"]
        result:
          description: Result of the call
          oneOf:
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: object
            - type: boolean
            - type: object
            - type: string
    JsonRpcError:
      title: JSON-RPC Error
      type: object
      required:
        - jsonrpc
        - id
        - error
      properties:
        jsonrpc:
          description: Must be exactly "2.0"
          type: string
          enum: ["2.0"]
        id:
          description: Same identifier established by the client in the call
          oneOf:
            - type: number
            - type: string
          examples: [1, "1"]
        error:
          description: Error details
          type: object
          properties:
            code:
              description: Error code
              type: integer
            message:
              description: Error message
              type: string
    JsonRpcSingleResponse:
      title: JSON-RPC Single Response
      oneOf:
        - $ref: "#/components/schemas/JsonRpcResult"
        - $ref: "#/components/schemas/JsonRpcError"
    JsonRpcBatchResponse:
      title: JSON-RPC Batch Response
      type: array
      items:
        $ref: "#/components/schemas/JsonRpcSingleResponse"
    JsonRpcResponse:
      title: JSON-RPC Response
      oneOf:
        - $ref: "#/components/schemas/JsonRpcSingleResponse"
        - $ref: "#/components/schemas/JsonRpcBatchResponse"

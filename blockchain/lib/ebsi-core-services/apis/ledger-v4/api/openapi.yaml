openapi: 3.1.0
info:
  title: Ledger API v4
  version: 4.0.0
  description: |
    Ledger API service gives use case applications access to all the
    available blockchain protocol interfaces and capabilities provided by the
    ledger nodes software running on MS hosted nodes.

    The Ledger API is a Core Service of the EBSI platform providing access to
    the EBSI Ledger Protocol(s) and Smart Contracts services running at the
    lower layer Chain & Storage.

    EBSI Ledger API provides capabilities to interact with Hyperledger Besu.
  license:
    name: EUPL-1.2
    url: https://joinup.ec.europa.eu/page/eupl-text-11-12
  contact:
    name: EBSI Support - Service Desk
    url: https://ec.europa.eu/digital-building-blocks/tracker/plugins/servlet/desk/portal/11
paths:
  /ledger/v4/blockchains/besu:
    post:
      operationId: post-blockchains-besu
      tags:
        - Hyperledger Besu
      summary: Besu JSON-RPC API
      description: |
        Hyperledger Besu Ethereum Enterprise Client JSON-RPC API.
      requestBody:
        required: true
        description: |
          The body follows the
          [JSON-RPC 2.0 specification](https://www.jsonrpc.org/specification).
          It requires the following fields:

          - **jsonrpc**: Must be exactly "2.0"
          - **method**: Hyperledger Besu JSON-RPC native method that is invoked.
          - **params**: Array of parameters.
          - **id**: Identifier established by the client.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
            examples:
              Get Block:
                value:
                  jsonrpc: "2.0"
                  method: eth_getBlockByNumber
                  params:
                    - "123456"
                    - true
                  id: 1
              Get Transaction:
                value:
                  jsonrpc: "2.0"
                  method: eth_getTransactionByHash
                  params:
                    - "0x88df016429689c079f3b2f6ad39fa052532c56795b733da78a91ebe6a713944b"
                  id: 1
              Batch Request:
                value:
                  - jsonrpc: "2.0"
                    method: eth_getBlockByNumber
                    params:
                      - "123456"
                      - true
                    id: 1
                  - jsonrpc: "2.0"
                    method: eth_getTransactionByHash
                    params:
                      - "0x88df016429689c079f3b2f6ad39fa052532c56795b733da78a91ebe6a713944b"
                    id: 2
      responses:
        "200":
          description: JSON-RPC Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
              examples:
                Get Block:
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result:
                      number: "0x1e240"
                      hash: "0x266bd6a41047c0929ebedd56cae148caab0d20a23aa1895bb95524a300ef9187"

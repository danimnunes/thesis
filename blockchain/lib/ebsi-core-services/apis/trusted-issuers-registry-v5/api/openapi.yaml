  /trusted-issuers-registry/v5/jsonrpc:
    post:
      operationId: post-jsonrpc
      summary: JSON-RPC API
      description: |
        The JSON-RPC API provides methods assisting the construction of blockchain transactions for
        TIR SC operations, and interaction with the ledger.
      tags:
        - JSON-RPC
      security:
        - bearerAuth: []
      requestBody:
        description: |
          The body follows the
          [JSON-RPC 2.0 specification](https://www.jsonrpc.org/specification).

          It requires the following fields:

          - **jsonrpc**: must be exactly "2.0"
          - **method**: method to be invoked
          - **params**: method parameters
          - **id**: identifier established by the client

          ### API Methods

          #### setAttributeMetadata

          Requires an access token with `tir_write` scope.

          Call to build an unsigned transaction to set the metadata of an attribute.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: DID of the issuer
          - **revisionId**: Attribute ID (hexadecimal string prefixed with 0x)
          - **issuerType**: 1 (RootTAO), 2 (TAO), 3 (TI), or 4 (Revoked)
          - **taoDid**: DID of the TAO accrediting the issuer
          - **attributeIdTao**: Attribute ID that accredits taoDid as TAO or RootTAO (hexadecimal string prefixed with 0x)

          #### setAttributeData

          Requires an access token with `tir_invite` or `tir_write` scope.

          Call to build an unsigned transaction to set an attribute.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: DID of the issuer
          - **attributeId**: ID of the attribute to set (hexadecimal string prefixed with 0x)
          - **attributeData**: Verifiable credential converted to an hexadecimal string prefixed with 0x

          #### addIssuerProxy

          Requires an access token with `tir_write` scope.

          Call to build an unsigned transaction to insert a new proxy to an issuer. It can be
          added by the issuer itself or an admin registered in the Trusted Policies Registry
          to update issuers.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: DID of the issuer
          - **proxyData**: Proxy configuration to be used during the verification of credentials. For the
            registration to be accepted, the configured proxy must serve a status list which is valid and
            signed by the issuer requesting the proxy. The validation is done by combining "prefix" with
            "testSuffix" and executed before accepting the registration. Proxy must be configured before
            any VCs are issued. The validation will fail if the credential status proxy doesn't exist.
            It must be a JSON object converted to a string. Example: `JSON.stringify({"prefix":"https://example.net","headers":{"Authorization":"Bearer 1234567890"},"testSuffix":"/cred/1"})`.

          #### updateIssuerProxy

          Requires an access token with `tir_write` scope.

          Call to build an unsigned transaction to update an existing proxy of an issuer. It can be
          updated by the issuer itself or an admin registered in the Trusted Policies Registry
          to update issuers.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: DID of the issuer
          - **proxyId**: ID of the existing proxy (hexadecimal string prefixed with 0x)
          - **proxyData**: Proxy configuration to be used during the verification of credentials. For the
            registration to be accepted, the configured proxy must serve a status list which is valid and
            signed by the issuer requesting the proxy. The validation is done by combining "prefix" with
            "testSuffix" and executed before accepting the registration. Proxy must be configured before
            any VCs are issued. The validation will fail if the credential status proxy doesn't exist.
            It must be a JSON object converted to a string. Example: `JSON.stringify({"prefix":"https://example.net","headers":{"Authorization":"Bearer 1234567890"},"testSuffix":"/cred/1"})`.

          #### removeIssuerProxy

          Requires an access token with `tir_write` scope.

          Call to build an unsigned transaction to remove an existing proxy of an issuer. It can be
          removed by the issuer itself or an admin registered in the Trusted Policies Registry
          to update issuers.

          Parameters:
          - **from**: Ethereum address of the signer
          - **did**: DID of the issuer
          - **proxyId**: ID of the existing proxy (hexadecimal string prefixed with 0x)

          #### sendSignedTransaction

          Requires an access token with `tir_invite` or `tir_write` scope.

          Sends a signed transaction to the blockchain and returns the hash of the transaction.

          **Warning: the transaction is not immediately processed. Make sure to check that the transaction has been successfully included in a block before moving on.**

          You can get the [receipt of the transaction](https://besu.hyperledger.org/public-networks/reference/api/objects#transaction-receipt-object) by calling the [`eth_getTransactionReceipt`](https://besu.hyperledger.org/public-networks/reference/api#eth_gettransactionreceipt) method of [Ledger API's Besu endpoint](/apis/pilot/ledger/v4/post-blockchains-besu).

          Receipts for pending transactions are not available, therefore you will have to wait until the transaction has been processed — usually a few seconds. We recommend you to poll the `eth_getTransactionReceipt` method until the receipt is available.

          Once the receipt is available, you can check the `status` field to know if the transaction succeeded (`0x1`) or failed (`0x0`). If the transaction failed, the `revertReason` field will give you insights about the reason for the failure. You can learn more about the format of the revert reason in [Besu's documentation](https://besu.hyperledger.org/private-networks/how-to/send-transactions/revert-reason#revert-reason-format).
        content:
          application/json:
            schema:
              required:
                - jsonrpc
                - id
                - method
                - params
              type: object
              properties:
                jsonrpc:
                  description: Must be exactly "2.0"
                  type: string
                method:
                  description: Method that needs to be invoked
                  type: string
                params:
                  description: Array of parameters
                  type: array
                  items:
                    type: object
                id:
                  description: Identifier established by the client
                  type: integer
                  example: 1
            examples:
              Build tx to set attribute metadata:
                value:
                  jsonrpc: "2.0"
                  method: setAttributeMetadata
                  params:
                    - from: "0x8445fC96e27ceB0d1794be16a1Ac8BF5D765AACB"
                      did: did:ebsi:zpxbBfHYA5GN45rS1tSEBJg
                      revisionId: "0x3f4143c6f3a1c79bb32f45a6cbd90ee6bb2e2e71eadda99e371a4a144c53050f"
                      issuerType: 3
                      taoDid: did:ebsi:zj4sk7oEMx1SGNAzibWxVAV
                      attributeIdTao: "0xbd6123874c340eaea25a1fc01785593c350fd9216ed3a69864549f8013d501b4"
                  id: 856
              Build tx to set attribute data:
                value:
                  jsonrpc: "2.0"
                  method: setAttributeData
                  params:
                    - from: "0xD442e39AAd178Ec9DfD039aD048203D5d0122e61"
                      did: did:ebsi:zpxbBfHYA5GN45rS1tSEBJg
                      attributeId: "0x3f4143c6f3a1c79bb32f45a6cbd90ee6bb2e2e71eadda99e371a4a144c53050f"
                      attributeData: ""
                  id: 502
              Build tx to add a new issuer proxy:
                value:
                  jsonrpc: "2.0"
                  method: addIssuerProxy
                  params:
                    - from: "0x8445fC96e27ceB0d1794be16a1Ac8BF5D765AACB"
                      did: did:ebsi:zZviptEhFN1r2u18hhi7Hof
                      proxyData: '{"prefix":"https://example.net","headers":{"Authorization":"Bearer 63829b578ccaa61f27c889ab270642f2"},"testSuffix":"/cred/1"}'
                  id: 752
              Build tx to update an issuer proxy:
                value:
                  jsonrpc: "2.0"
                  method: updateIssuerProxy
                  params:
                    - from: "0x8445fC96e27ceB0d1794be16a1Ac8BF5D765AACB"
                      did: did:ebsi:zZviptEhFN1r2u18hhi7Hof
                      proxyId: "0xfb33cccb447605de75846617385f6d2aac28010f53a89ecb5ce151751c53c8d4"
                      proxyData: '{"prefix":"https://example.net","headers":{"Authorization":"Bearer 63829b578ccaa61f27c889ab270642f2"},"testSuffix":"/cred/1"}'
                  id: 667
              Build tx to remove an issuer proxy:
                value:
                  jsonrpc: "2.0"
                  method: removeIssuerProxy
                  params:
                    - from: "0x8445fC96e27ceB0d1794be16a1Ac8BF5D765AACB"
                      did: did:ebsi:zZviptEhFN1r2u18hhi7Hof
                      proxyId: "0xfb33cccb447605de75846617385f6d2aac28010f53a89ecb5ce151751c53c8d4"
                  id: 667
              Send Transaction:
                description: Sends a signed transaction to the blockchain.
                value:
                  jsonrpc: "2.0"
                  method: sendSignedTransaction
                  params:
                    - protocol: eth
                      unsignedTransaction:
                        from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                        to: "0xFde86148db58f57787C06BeAf63a9c3f789357b3"
                        data: "0x0000..."
                        nonce: "0x00"
                        chainId: "0x1b3b"
                        gasLimit: "0x10000"
                        gasPrice: "0x00"
                        value: "0x00"
                      r: "0x..."
                      s: "0x..."
                      v: "0x..."
                      signedRawTransaction: "--- signed raw transaction ---"
                  id: 1
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
              examples:
                Build tx:
                  value:
                    jsonrpc: "2.0"
                    id: 482
                    result:
                      from: "0x8445fC96e27ceB0d1794be16a1Ac8BF5D765AACB"
                      to: "0xFdfbCE7F3c12A902B79e0ceB0DB2662331bBA1aF"
                      data: ""
                      value: "0x0"
                      nonce: "0xb1d3"
                      chainId: "0x181f"
                      gasLimit: "0x1000000"
                      gasPrice: "0x0"
                Send Transaction:
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result: "0xe670ec64341771606e55d6b4ca35a1a6b75ee3d5145a99d05921026d1527331"
        "400":
          description: Bad request
          content:
            "application/problem+json":
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Bad Request:
                  $ref: "#/components/examples/BadRequest"
                Invalid Token:
                  $ref: "#/components/examples/InvalidToken"
components:
  schemas:
    ProblemDetails:
      title: Problem Details
      description: A [Problem Details](https://datatracker.ietf.org/doc/html/rfc7807) object.
      type: object
      properties:
        type:
          type: string
          format: uri
          description: |
            An absolute URI that identifies the problem type. When dereferenced,
            it SHOULD provide human-readable documentation for the problem type.
          default: about:blank
        title:
          type: string
          description: |
            A short summary of the problem type.
          example: Internal Server Error
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence of the problem.
          minimum: 400
          maximum: 600
          example: 500
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the problem.
          example: Connection timeout
        instance:
          type: string
          format: uri
          description: |
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
    links:
      title: Links
      description: Links model used for pagination.
      type: object
      properties:
        last:
          type: string
          description: URI of the last page
        prev:
          type: string
          description: URI of the previous page
        next:
          type: string
          description: URI of the next page
        first:
          type: string
          description: URI of the first page
      x-examples:
        Links:
          first: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=1&page[size]=2
          prev: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=2&page[size]=2
          next: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=4&page[size]=2
          last: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=13&page[size]=2
    JsonRpcResponse:
      title: JSON-RPC Response
      type: object
      properties:
        jsonrpc:
          description: Must be exactly "2.0"
          type: string
        id:
          description: Same identifier established by the client in the call
          type: integer
        result:
          description: Result of the call
          oneOf:
            - type: object
            - type: string
    issuer:
      title: Issuer
      type: object
      description: Issuer object.
      properties:
        did:
          type: string
          description: did of the issuer
        attributes:
          type: string
          description: Link to issuer attributes
        hasAttributes:
          type: boolean
          description: This boolean is true when at least one credential is registered. It is false when the issuer is created but none of the credentials has been accepted yet.
    issuer__deprecated:
      title: Issuer (deprecated)
      type: object
      description: Issuer object.
      properties:
        did:
          type: string
          description: did of the issuer
        attributes:
          type: array
          description: Array of attributes
          items:
            $ref: "#/components/schemas/attribute"
    attribute:
      title: Attribute
      type: object
      description: Attribute object.
      properties:
        hash:
          type: string
          description: sha256 hash of the payload
        body:
          type: string
          description: Base64 encoded content
        issuerType:
          type: string
          description: RootTAO, TAO, TI, Revoked or Undefined
        tao:
          type: string
          description: Trusted Accredited Organization that accredited the insertion of the attribute
        rootTao:
          type: string
          description: Root chain of accreditations
    attributeDetails:
      title: Attribute details
      type: object
      description: Attribute details.
      properties:
        did:
          type: string
          description: DID of the attribute owner
        attribute:
          $ref: "#/components/schemas/attribute"
    proxy:
      title: Attribute
      type: object
      description: Attribute object.

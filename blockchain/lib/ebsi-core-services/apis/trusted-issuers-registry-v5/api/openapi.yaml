  /trusted-issuers-registry/v5/issuers/{did}:
    get:
      operationId: get-issuer
      summary: Get an issuer
      description: Returns a trusted issuer identified by its decentralised identifier (DID).
      tags:
        - Issuers
      parameters:
        - name: did
          in: path
          schema:
            type: string
          examples:
            did:
              description: Valid Pilot DID
              value: did:ebsi:zZeKyEJfUTGwajhNyNX928z
          required: true
        - in: query
          name: version
          description: |
            Version of the endpoint to use. Defaults to the latest version.
          required: false
          schema:
            type: string
            enum:
              - deprecated
              - latest
          example: "deprecated"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/issuer"
                  - $ref: "#/components/schemas/issuer__deprecated"
              examples:
                Issuer:
                  value:
                    did: did:ebsi:zZeKyEJfUTGwajhNyNX928z
                    attributes: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers/did:ebsi:zZeKyEJfUTGwajhNyNX928z/attributes
                    hasAttributes: true
                Issuer (deprecated):

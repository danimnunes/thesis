    name: EBSI Support - Service Desk
    url: https://ec.europa.eu/digital-building-blocks/tracker/plugins/servlet/desk/portal/11
  license:
    name: EUPL-1.2
    url: https://joinup.ec.europa.eu/page/eupl-text-11-12
paths:
  /trusted-issuers-registry/v5/issuers:
    get:
      operationId: get-issuers
      summary: List issuers
      description: Returns a list of trusted issuers.
      tags:
        - Issuers
      parameters:
        - in: query
          name: page[after]
          schema:
            type: string
          description: Cursor that points to the end of the page of data that has been returned.
        - schema:
            type: integer
          in: query
          name: page[size]
          description: Defines the maximum number of objects that may be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                    description: URI to issuers
                  items:
                    type: array
                    description: list of issuers with their decentralized identifier
                    items:
                      type: object
                      properties:
                        did:
                          type: string
                          description: Issuer's DID
                        href:
                          type: string
                          description: Link to issuer
                  total:
                    type: integer
                    description: Total number of items in a collection
                  pageSize:
                    type: integer
                    description: Number of items to be returned per page
                  links:
                    $ref: "#/components/schemas/links"
              examples:
                Success:
                  value:
                    self: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=182&page[size]=10
                    items:
                      - did: did:ebsi:zppVrNT9bBgMqxrJqVEnvyk
                        href: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers/did:ebsi:zppVrNT9bBgMqxrJqVEnvyk
                      - did: did:ebsi:zr2rWDHHrUCdZAW7wsSb5nQ
                        href: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers/did:ebsi:zr2rWDHHrUCdZAW7wsSb5nQ
                      - did: did:ebsi:zzQar5zYxUCo1bPypeN3tiF
                        href: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers/did:ebsi:zzQar5zYxUCo1bPypeN3tiF
                      - did: did:ebsi:z23usJB14wsPNwTds2esnoJt
                        href: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers/did:ebsi:z23usJB14wsPNwTds2esnoJt
                      - did: did:ebsi:zZviptEhFN1r2u18hhi7Hof
                        href: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers/did:ebsi:zZviptEhFN1r2u18hhi7Hof
                    total: 1816
                    pageSize: 10
                    links:
                      first: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=1&page[size]=10
                      prev: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=181&page[size]=10
                      next: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=182&page[size]=10
                      last: https://api-pilot.ebsi.eu/trusted-issuers-registry/v5/issuers?page[after]=182&page[size]=10

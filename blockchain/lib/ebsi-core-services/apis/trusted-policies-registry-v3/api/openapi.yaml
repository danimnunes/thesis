  /trusted-policies-registry/v3/jsonrpc:
    post:
      operationId: post-jsonrpc
      summary: JSON-RPC API
      description: |
        The JSON-RPC API provides methods assisting the construction of blockchain transactions and
        interaction with the ledger.
      tags:
        - JSON-RPC
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: |
          The body follows the
          [JSON-RPC 2.0 specification](https://www.jsonrpc.org/specification).

          It requires the following fields:

          - **jsonrpc**: must be exactly "2.0"
          - **method**: method to be invoked
          - **params**: method parameters
          - **id**: identifier established by the client

          ### API Methods

          #### insertPolicy

          Call to build an unsigned transaction to insert a policy in the registry.
          This method requires an access token with "tpr_write" scope and the OPERATOR role in the
          Trusted Policies Registry.

          Parameters:
          - **from**: Ethereum address of the signer
          - **policyName**: name of the policy.
          - **description**: description.

          #### updatePolicy

          Call to build an unsigned transaction to update a policy.
          This method requires an access token with "tpr_write" scope and the OPERATOR role in the
          Trusted Policies Registry.

          Parameters:
          - **from**: Ethereum address of the signer
          - **policyId**: Policy ID
          - **policyName**: Policy Name
          - **description**: description.

          Use either `policyId` OR `policyName` to identify the policy, but not both.

          #### deactivatePolicy

          Call to build an unsigned transaction to deactivate a policy in the registry.
          This method requires an access token with "tpr_write" scope and the OPERATOR role in the
          Trusted Policies Registry.

          Parameters:
          - **from**: Ethereum address of the signer
          - **policyId**: ID of the policy to deactivate
          - **policyName**: Policy Name

          Use either `policyId` OR `policyName` to identify the policy, but not both.

          #### activatePolicy

          Call to build an unsigned transaction to activate a policy in the registry.
          This method requires an access token with "tpr_write" scope and the OPERATOR role in the
          Trusted Policies Registry.

          Parameters:
          - **from**: Ethereum address of the signer
          - **policyId**: ID of the policy to activate
          - **policyName**: Policy Name

          Use either `policyId` OR `policyName` to identify the policy, but not both.

          #### insertUserAttributes

          Call to build an unsigned transaction to insert user attributes in the registry.
          This method requires an access token with "tpr_write" scope and the OPERATOR role in the
          Trusted Policies Registry.

          Parameters:
          - **from**: Ethereum address of the signer
          - **user**: user address
          - **attributes**: attribute names

          #### deleteUserAttribute

          Call to build an unsigned transaction to delete an user attribute in the registry.
          This method requires an access token with "tpr_write" scope and the OPERATOR role in the
          Trusted Policies Registry.

          Parameters:
          - **from**: Ethereum address of the signer
          - **user**: user address
          - **attribute**: attribute name

          #### sendSignedTransaction

          Call to send a signed transaction to the blockchain.
        content:
          application/json:
            schema:
              required:
                - jsonrpc
                - id
                - method
                - params
              type: object
              properties:
                jsonrpc:
                  description: Must be exactly "2.0"
                  type: string
                method:
                  description: Method that needs to be invoked
                  type: string
                params:
                  description: Array of parameters
                  type: array
                  items:
                    type: object
                id:
                  description: Identifier established by the client
                  type: integer
                  example: 1
            examples:
              Build tx to insertPolicy:
                value:
                  jsonrpc: "2.0"
                  method: insertPolicy
                  id: 1
                  params:
                    - from: "0x6bd81E8CaA368CC196d573a26F1BE6c0753aC6e6"
                      policyName: policy-test-237a346cd80aea1afb21d66ce39f7695
                      description: description-test-98efbd91f1c40d254f4fd699a3f7b9fa
              Build tx to updatePolicy (by policyId):
                value:
                  jsonrpc: "2.0"
                  method: updatePolicy
                  id: 1
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      policyId: "1"
                      policyName: policy-test-0245fd52e9606e375ffe7d46718d60c8
                      description: description-test-867fc5181e2a0df61094cb565cf18d96
              Build tx to deactivatePolicy (by policyId):
                value:
                  jsonrpc: "2.0"
                  method: deactivatePolicy
                  id: 1
                  params:
                    - from: "0x6bd81E8CaA368CC196d573a26F1BE6c0753aC6e6"
                      policyId: "1"
              Build tx to activatePolicy (by policyId):
                value:
                  jsonrpc: "2.0"
                  method: activatePolicy
                  id: 1
                  params:
                    - from: "0x6bd81E8CaA368CC196d573a26F1BE6c0753aC6e6"
                      policyId: "1"
              Build tx to updatePolicy (by policyName):
                value:
                  jsonrpc: "2.0"
                  method: updatePolicy
                  id: 1
                  params:
                    - from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      policyName: "TSR:insertSchema"
                      description: description-test-867fc5181e2a0df61094cb565cf18d96
              Build tx to deactivatePolicy (by policyName):
                value:
                  jsonrpc: "2.0"
                  method: deactivatePolicy
                  id: 1
                  params:
                    - from: "0x6bd81E8CaA368CC196d573a26F1BE6c0753aC6e6"
                      policyName: "TSR:insertSchema"
              Build tx to activatePolicy (by policyName):
                value:
                  jsonrpc: "2.0"
                  method: activatePolicy
                  id: 1
                  params:
                    - from: "0x6bd81E8CaA368CC196d573a26F1BE6c0753aC6e6"
                      policyName: "TSR:insertSchema"
              Build tx to insertUserAttributes:
                value:
                  jsonrpc: "2.0"
                  method: insertUserAttributes
                  id: 1
                  params:
                    - from: "0x6bd81E8CaA368CC196d573a26F1BE6c0753aC6e6"
                      user: "0x5B740B7aB0A383F6F03579B90e591B4B06a81BF6"
                      attributes:
                        - TSR:insertSchema
                        - TAR:insertApp
              Build tx to deleteUserAttribute:
                value:
                  jsonrpc: "2.0"
                  method: deleteUserAttribute
                  id: 1
                  params:
                    - from: "0x6bd81E8CaA368CC196d573a26F1BE6c0753aC6e6"
                      user: "0x5B740B7aB0A383F6F03579B90e591B4B06a81BF6"
                      attribute: TSR:insertSchema
              Send Transaction:
                description: Call to send a signed transaction to the blockchain.
                value:
                  jsonrpc: "2.0"
                  method: sendSignedTransaction
                  id: 1
                  params:
                    - protocol: eth
                      unsignedTransaction:
                        from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                        to: "0xFde86148db58f57787C06BeAf63a9c3f789357b3"
                        data: "0x0000..."
                        nonce: "0x00"
                        chainId: "0x1b3b"
                        gasLimit: "0x10000"
                        gasPrice: "0x00"
                        value: "0x00"
                      r: "0x..."
                      s: "0x..."
                      v: "0x..."
                      signedRawTransaction: "--- signed raw transaction ---"
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
              examples:
                Build tx:
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result:
                      from: "0x416e6e6162656c2e4c65652e452d412d506f652e"
                      to: "0xFde86148db58f57787C06BeAf63a9c3f789357b3"
                      data: "0x0000..."
                      nonce: "0x00"
                      chainId: "0x1b3b"
                      gasLimit: "0x10000"
                      gasPrice: "0x00"
                      value: "0x00"
                Send Transaction:
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result: "0xe670ec64341771606e55d6b4ca35a1a6b75ee3d5145a99d05921026d1527331"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Bad Request:
                  $ref: "#/components/examples/BadRequest"
components:
  schemas:
    Links:
      title: Links
      type: object
      description: Links model used for pagination.
      properties:
        first:
          type: string
          description: Hyperlink to the first page.
        prev:
          type: string
          description: Hyperlink to the previous page.
        next:
          type: string
          description: Hyperlink to the next page.
        last:
          type: string
          description: Hyperlink to the last page.
    User:
      title: User
      type: object
      description: User data model
      properties:
        user:
          type: string
          description: User address
        attributes:
          description: Set of attributes
          type: array
          items:
            type: string
    Subject:
      title: User
      type: object
      description: User data model
      properties:
        user:
          type: string
          description: User address
    UserPolicy:
      title: User
      type: object
      description: User data model
      properties:
        policyName:
          type: string
          description: Policy name
        user:
          type: string
          description: User address
    Policy:
      title: Policy
      type: object
      description: Policy data model
      properties:
        policyId:
          type: string
          description: Unique policy ID
        description:
          type: string
          description: policy description
        policyName:
          type: string
          description: Name of the policy
        status:
          type: boolean
          description: Status of the policy (false = inactive, true = active)
    JsonRpcResponse:
      title: JSON-RPC Response
      type: object
      properties:
        jsonrpc:
          description: Must be exactly "2.0"
          type: string
        id:
          description: Same identifier established by the client in the call
          type: integer
        result:
          description: Result of the call
          oneOf:
            - type: object
            - type: string
    ProblemDetails:
      title: Problem Details
      description: A [Problem Details](https://datatracker.ietf.org/doc/html/rfc7807) object.
      type: object
      properties:
        type:
          type: string
          format: uri
          description: |
            An absolute URI that identifies the problem type. When dereferenced, it SHOULD provide human-readable documentation for the problem type.
          default: about:blank
        title:
          type: string
          description: A short summary of the problem type.
          example: Internal Server Error
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence of the problem.
          minimum: 400
          maximum: 600
          example: 500
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the problem.
          example: Connection timeout
        instance:
          type: string
          format: uri
          description: |
            An absolute URI that identifies the specific occurrence of the problem. It may or may
            not yield further information if dereferenced.
  responses:
    "400":
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            Bad Request:
              $ref: "#/components/examples/BadRequest"
    "500":
      description: Internal Error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            Internal Server Error:
              $ref: "#/components/examples/InternalError"
  examples:
    BadRequest:
      value:
        title: Bad Request
        status: 400
        detail: Bad request.
    NotFound:
      value:
        title: Not found
        status: 404
        detail: Not found
    InternalError:
      value:
        title: Internal Server Error
        status: 500
        detail: The server encountered an internal error and was unable to process your request.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
  - url: http://localhost
    description: Local Computer Environment
  - url: https://api-test.ebsi.eu
    description: EBSI Test Environment
  - url: https://api-pilot.ebsi.eu
    description: EBSI Pilot Environment
  - url: https://api-conformance.ebsi.eu
    description: EBSI Conformance Environment

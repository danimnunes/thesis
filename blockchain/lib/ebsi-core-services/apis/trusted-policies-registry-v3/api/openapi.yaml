openapi: 3.1.0
info:
  title: Trusted Policies Registry API v3
  version: 3.0.0
  description: |
    The Trusted Policies Registry API provides an interface to interact with policies stored at the ledger administrated by the Trusted Policies Registry Smart Contract.
  contact:
    name: EBSI Support - Service Desk
    url: https://ec.europa.eu/digital-building-blocks/tracker/plugins/servlet/desk/portal/11
  license:
    name: EUPL-1.2
    url: https://joinup.ec.europa.eu/page/eupl-text-11-12
paths:
  /trusted-policies-registry/v3/policies:
    get:
      operationId: get-policies
      summary: List policies
      description: Returns a list of policies registered in the blockchain.
      tags:
        - Policies
      parameters:
        - in: query
          name: page[after]
          schema:
            type: string
          description: Cursor that points to the end of the page of data that has been returned.
        - schema:
            type: integer
          in: query
          name: page[size]
          description: Defines the maximum number of objects that may be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                    description: URI to policies
                  items:
                    type: array
                    description: List of policies
                    items:
                      type: object
                      properties:
                        policyName:
                          type: string
                          description: Name of the policy
                        href:
                          type: string
                          description: Link to the resource
                  total:
                    type: integer
                    description: Total number of items in a collection
                  pageSize:
                    type: integer
                    description: Number of items to be returned per page
                  links:
                    $ref: "#/components/schemas/Links"
              examples:
                Success:
                  value:
                    self: https://api-pilot.ebsi.eu/trusted-policies-registry/v3/policies?page[after]=3&page[size]=2
                    items:
                      - policyName: "TSR:insertSchema"
                        href: https://api-pilot.ebsi.eu/trusted-policies-registry/v3/policies/TSR:insertSchema
                      - policyName: "TSR:updateSchema"
                        href: https://api-pilot.ebsi.eu/trusted-policies-registry/v3/policies/TSR:updateSchema
                    total: 124
                    pageSize: 2
                    links:
                      first: https://api-pilot.ebsi.eu/trusted-policies-registry/v3/policies?page[after]=1&page[size]=2
                      prev: https://api-pilot.ebsi.eu/trusted-policies-registry/v3/policies?page[after]=2&page[size]=2
                      next: https://api-pilot.ebsi.eu/trusted-policies-registry/v3/policies?page[after]=4&page[size]=2
                      last: https://api-pilot.ebsi.eu/trusted-policies-registry/v3/policies?page[after]=62&page[size]=2
        "400":
          $ref: "#/components/responses/400"
        "500":
          $ref: "#/components/responses/500"
  /trusted-policies-registry/v3/policies/{policyName}:
    get:
      operationId: get-policy
      summary: Get a policy
      description: Returns a trusted policy identified by its name.
      tags:
        - Policies
      parameters:
        - name: policyName
          in: path
          schema:
            type: string
          example: "TSR:insertSchema"
          required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
              examples:
                Success:
                  value:
                    policyId: "0"
                    description: description-test-036ccfd98b88a9c3ad1a23e730bc414f
                    policyName: policy-test-fd0010fa07c2ff3eba04a46547687d17
                    status: true
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Policy Not Found:
                  $ref: "#/components/examples/NotFound"
        "500":
          $ref: "#/components/responses/500"

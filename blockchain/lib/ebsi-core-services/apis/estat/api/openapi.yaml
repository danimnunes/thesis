                  - subject: did:ebsi:zxaYaUtb8pvoAtYNWbKcveg
                    documentId: "0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8"
                    grantedBy: did:ebsi:zxaYaUtb8pvoAtYNWbKcveg
                    permission: creator
                total: 1
                pageSize: 10
                links:
                  first: https://api-pilot.ebsi.eu/estat/v1/documents/0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8/accesses?page[after]=1&page[size]=10
                  prev: https://api-pilot.ebsi.eu/estat/v1/documents/0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8/accesses?page[after]=1&page[size]=10
                  next: https://api-pilot.ebsi.eu/estat/v1/documents/0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8/accesses?page[after]=1&page[size]=10
                  last: https://api-pilot.ebsi.eu/estat/v1/documents/0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8/accesses?page[after]=1&page[size]=10
        "400":
          description: Bad Request Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Invalid {documentId} Parameter:
                  value:
                    title: Bad Request
                    status: 400
                    detail: '["documentId must be 32 bytes encoded in hexadecimal and start with 0x"]'
                Bad Paging Request:
                  value:
                    title: Bad Paging Request
                    status: 400
                    detail: '["page[size] must not be greater than 50"]'
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:

  /estat/v1/documents/{documentId}/events/{eventId}:
    get:
      operationId: get-document-event
      summary: Get an event
      description: Gets the event corresponding to the document ID and event ID.
      tags:
        - Document
      parameters:
        - in: path
          name: documentId
          description: |
            The 32-bytes ID of the document, encoded in hexadecimal.
          required: true
          schema:
            type: string
          example: "0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8"
        - in: path
          name: eventId
          description: |
            The 32-bytes ID of the event, encoded in hexadecimal.
          required: true
          schema:
            type: string
          example: "0x4791c04d2e4838042c67f3e739ab8639b6bd0f6896ec7e32e99c640d43b530c7"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
              example:
                externalHash: "0x7caebd56efed5cf6758c401961de9e33dff856cece64cb6ff3aa3a587393b96d"
                hash: "0x4791c04d2e4838042c67f3e739ab8639b6bd0f6896ec7e32e99c640d43b530c7"
                timestamp:
                  datetime: "0x65d372cb"
                  source: block
                  proof: "0x000000000000000000000000000000000000000000000000000000000047a88d"
                sender: "did:ebsi:zxaYaUtb8pvoAtYNWbKcveg"
                origin: origin
                metadata: eventMetadata
        "400":
          description: Bad Request Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Invalid {documentId} Parameter:
                  value:
                    title: Bad Request
                    status: 400
                    detail: '["documentId must be 32 bytes encoded in hexadecimal and start with 0x"]'
                Invalid {eventId} Parameter:
                  value:
                    title: Bad Request
                    status: 400
                    detail: '["eventId must be 32 bytes encoded in hexadecimal and start with 0x"]'
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Document Not Found:
                  $ref: "#/components/examples/NotFound"
                Event Not Found:
                  $ref: "#/components/examples/NotFound"
        "500":

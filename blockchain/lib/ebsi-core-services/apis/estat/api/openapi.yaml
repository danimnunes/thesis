              examples:
                Internal Server Error:
                  $ref: "#/components/examples/InternalError"
  /estat/v1/documents/{documentId}/accesses:
    get:
      operationId: get-document-accesses
      summary: List accesses
      description: Returns a list of accesses related to the document.
      tags:
        - Document
      parameters:
        - in: path
          name: documentId
          description: |
            The 32-bytes ID of the document, encoded in hexadecimal.
          required: true
          schema:
            type: string
          example: "0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8"
        - in: query
          name: page[after]
          schema:
            type: string
          description: Cursor that points to the end of the page of data that has been returned.
        - schema:
            type: integer
          in: query
          name: page[size]
          description: Defines the maximum number of objects that may be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                    description: Absolute path to the collection (consult)
                  items:
                    type: array
                    description: List of accesses
                    items:
                      type: object
                      properties:
                        subject:
                          type: string
                          description: A `did:ebsi` or `did:key` DID.
                        documentId:
                          type: string
                          description: The document ID.
                        grantedBy:
                          type: string
                          description: |
                            The `did:ebsi` or `did:key` DID of the granter of the permission.
                            "creator" shall have itself as "grantedBy".
                        permission:
                          type: string
                          description: |
                            Permission granted: "write", "delegate" or "creator".

          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Internal Server Error:
                  $ref: "#/components/examples/InternalError"
  /estat/v1/accesses:
    head:
      operationId: head-accesses
      summary: Check access
      description: Checks if the DID is included in the allowlist of TnT Document creators or not.
      tags:
        - Accesses
      parameters:
        - in: query
          name: creator
          description: DID to check
          schema:
            type: string
          required: true
          example: did:ebsi:zxaYaUtb8pvoAtYNWbKcveg
      responses:
        "204":
          description: Success
        "400":
          description: Bad Request Error
        "404":
          description: DID not found in the allowlist
        "500":
          description: Internal Server Error
    get:
      operationId: get-accesses
      summary: Get accesses
      description: Get accesses filtered by subject.
      tags:
        - Accesses
      parameters:
        - in: query
          name: subject
          description: Subject DID
          schema:
            type: string
          required: true
          example: did:ebsi:zxaYaUtb8pvoAtYNWbKcveg
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                    description: Absolute path to the collection (consult)
                  items:
                    type: array
                    description: List of accesses
                    items:
                      type: object
                      properties:
                        subject:
                          type: string
                          description: Subject
                        documentId:
                          type: string
                          description: Document ID
                        grantedBy:
                          description: DID that granted the access
                          type: string
                        permission:
                          description: Type of permission
                          type: string
                          enum:
                            - write
                            - delegate
                            - creator
                  total:
                    type: integer
                    description: Total number of items across all pages.
                  pageSize:
                    type: integer
                    description: |
                      Maximum number of items per page. For the last page, its value should be
                      independent of the number of actually returned items.
                  links:
                    $ref: "#/components/schemas/Links"
              example:
                self: https://api-pilot.ebsi.eu/estat/v1/accesses?page[after]=1&page[size]=10&subject=did:ebsi:ztqWJAmfyuUEf9Jvh97p167
                items:
                  - documentId: "0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8"
                    subject: did:ebsi:ztqWJAmfyuUEf9Jvh97p167
                    grantedBy: did:ebsi:zmRQoAM1YrVBVA3cP6CwYfc
                    permission: write
                  - documentId: "0xbfc90433cfe7cf69119899a96837032bee6c84ba7f6ac9aa008ef2de5eeacfb8"
                    subject: did:ebsi:ztqWJAmfyuUEf9Jvh97p167
                    grantedBy: did:ebsi:zmRQoAM1YrVBVA3cP6CwYfc
                    permission: delegate
                total: 2
                pageSize: 10
                links:
                  first: https://api-pilot.ebsi.eu/estat/v1/accesses?page[after]=1&page[size]=10&subject=did:ebsi:ztqWJAmfyuUEf9Jvh97p167
                  prev: https://api-pilot.ebsi.eu/estat/v1/accesses?page[after]=1&page[size]=10&subject=did:ebsi:ztqWJAmfyuUEf9Jvh97p167
                  next: https://api-pilot.ebsi.eu/estat/v1/accesses?page[after]=2&page[size]=10&subject=did:ebsi:ztqWJAmfyuUEf9Jvh97p167
                  last: https://api-pilot.ebsi.eu/estat/v1/accesses?page[after]=10&page[size]=10&subject=did:ebsi:ztqWJAmfyuUEf9Jvh97p167
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Document Not Found:
                  $ref: "#/components/examples/NotFound"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Internal Server Error:
                  $ref: "#/components/examples/InternalError"
  /estat/v1/abi:
    get:
      operationId: get-abi
      summary: Get ABI
      description: Returns the ABI of Track and Trace SC v1.
      tags:
        - ABI
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                description: The ABI of Track and Trace SC v1.
  /estat/v1/jsonrpc:
    post:
      operationId: post-jsonrpc
      tags:
        - JSON-RPC
      summary: JSON-RPC API
      description: |
        The JSON-RPC API provides methods assisting the construction of blockchain transactions and
        interaction with the ledger, i.e. write operation on ledger.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: |
          The body follows the [JSON-RPC 2.0 specification](https://www.jsonrpc.org/specification).

          It requires the following fields:

          - **jsonrpc**: must be exactly "2.0"
          - **method**: method to be invoked
          - **params**: method parameters
          - **id**: identifier established by the client

          ### API Methods

          #### authoriseDid

          Requires an access token with `tnt_authorise` scope.

          Call to build an unsigned transaction to authorise a DID to create documents.

          Parameters:
          - **from**: Ethereum address of the signer
          - **senderDid**: DID of the signer. Must be a `did:ebsi` DID (UTF-8)
          - **authorisedDid**: DID to authorise. Must be a `did:ebsi` DID (UTF-8) registered in the DID Registry.
          - **whiteList**: Boolean to define if the DID is authorized or unauthorized

          #### createDocument

          Requires an access token with `tnt_create` scope.

          Call to build an unsigned transaction to create a new Document.

          By default, it records the timestamp of the blockchain, but it's possible to define a different timestamp with its respective proof.

          Parameters:
          - **from**: Ethereum address of the signer
          - **documentHash**: Document hash
          - **documentMetadata**: Document metadata as hex string
          - **didEbsiCreator**: DID of the document creator. Must be a `did:ebsi` DID (UTF-8)
          - **timestamp** (optional): Timestamp as hex string. By default it uses takes the timestamp from the blockchain
          - **timestampProof** (optional): Timestamp proof as hex string. It must be defined when "timestamp" is defined

          #### removeDocument

          Requires an access token with `tnt_write` scope.

          Call to build an unsigned transaction to remove a document and all related resources.

          Parameters:
          - **from**: Ethereum address of the signer
          - **documentHash**: Document hash to remove

          #### grantAccess

          Requires an access token with `tnt_write` scope.

          Call to build an unsigned transaction to grant a permission for a DID in a specific document.

          "write" grant requires the transaction signer to be creator of the Document, or signer must have "delegate" permission in the Document. "delegate" grant requires the transaction signer to be creator of the Document.

          Parameters:
          - **from**: Ethereum address of the signer
          - **documentHash**: Document hash
          - **grantedByAccount**: Entity that grants the permission. If the entity uses the `did:ebsi` method, `grantedByAccount` must be the UTF-8 DID encoded in hexadecimal. If the entity uses the `did:key` method, `grantedByAccount` must be the secp256k1 uncompressed public key (64 bytes or 65 bytes with 04 prefix) encoded in hexadecimal.
          - **subjectAccount**: Entity that receives the permission. If the entity uses the `did:ebsi` method, `subjectAccount` must be the UTF-8 DID encoded in hexadecimal. If the entity uses the `did:key` method, `subjectAccount` must be the secp256k1 uncompressed public key (64 bytes or 65 bytes with 04 prefix) encoded in hexadecimal.
          - **grantedByAccType**: DID method of `grantedByAccount`. Use `0` for `did:ebsi` or `1` for `did:key`.
          - **subjectAccType**: DID method of `subjectAccount`. Use `0` for `did:ebsi` or `1` for `did:key`.
          - **permission**: Type of the permission to grant. Use `0` for "delegate" or `1` for "write"

          #### revokeAccess

          Requires an access token with `tnt_write` scope.

          Call to build an unsigned transaction to revoke a permission from a DID in a specific Document.

          Keep in mind that whenever the document's creator private key is lost, then there is no possibility to revoke access for this creator's documents anymore.

          Parameters:
          - **from**: Ethereum address of the signer
          - **documentHash**: Document hash
          - **revokedByAccount**: Entity that revokes the permission. If the entity uses the `did:ebsi` method, `revokedByAccount` must be the UTF-8 DID encoded in hexadecimal. If the entity uses the `did:key` method, `revokedByAccount` must be the secp256k1 uncompressed public key (64 bytes or 65 bytes with 04 prefix) encoded in hexadecimal.
          - **subjectAccount**: Entity whose permission is revoked. If the entity uses the `did:ebsi` method, `subjectAccount` must be the UTF-8 DID encoded in hexadecimal. If the entity uses the `did:key` method, `subjectAccount` must be the secp256k1 uncompressed public key (64 bytes or 65 bytes with 04 prefix) encoded in hexadecimal.
          - **permission**: Type of the permission to revoke. Use `0` for "delegate" or `1` for "write"

          #### writeEvent

          Requires an access token with `tnt_write` scope.

          Call to build an unsigned transaction to write an event into a specific document.

          By default, it records the timestamp of the blockchain, but it's possible to define a different timestamp with its respective proof.

          Parameters:
          - **from**: Ethereum address of the signer
          - **eventParams**: Event parameters. JSON with the following fields:
            - **documentHash**: Document hash (hex string)
            - **externalHash**: External hash (string)
            - **sender**: Entity that sends the event. If the entity uses the `did:ebsi` method, `sender` must be the UTF-8 DID encoded in hexadecimal. If the entity uses the `did:key` method, `sender` must be the secp256k1 uncompressed public key (64 bytes or 65 bytes with 04 prefix) encoded in hexadecimal.
            - **origin**: Origin (string)
            - **metadata**: Metadata (string)
          - **timestamp** (optional): Timestamp as hex string. By default it uses takes the timestamp from the blockchain
          - **timestampProof** (optional): Timestamp proof as hex string. It must be defined when "timestamp" is defined

          #### sendSignedTransaction

          Requires an access token with `tnt_authorise`, `tnt_create` or `tnt_write` scope.

          Sends a signed transaction to the blockchain and returns the hash of the transaction.

          **Warning: the transaction is not immediately processed. Make sure to check that the transaction has been successfully included in a block before moving on.**

          You can get the [receipt of the transaction](https://besu.hyperledger.org/public-networks/reference/api/objects#transaction-receipt-object) by calling the [`eth_getTransactionReceipt`](https://besu.hyperledger.org/public-networks/reference/api#eth_gettransactionreceipt) method of [Ledger API's Besu endpoint](/apis/pilot/ledger/v4/post-blockchains-besu).

          Receipts for pending transactions are not available, therefore you will have to wait until the transaction has been processed — usually a few seconds. We recommend you to poll the `eth_getTransactionReceipt` method until the receipt is available.

          Once the receipt is available, you can check the `status` field to know if the transaction succeeded (`0x1`) or failed (`0x0`). If the transaction failed, the `revertReason` field will give you insights about the reason for the failure. You can learn more about the format of the revert reason in [Besu's documentation](https://besu.hyperledger.org/private-networks/how-to/send-transactions/revert-reason#revert-reason-format).
        content:
          application/json:
            schema:
              required:
                - jsonrpc
                - id
                - method
                - params
              type: object
              properties:
                jsonrpc:
                  description: Must be exactly "2.0"
                  type: string
                method:
                  description: Method that needs to be invoked
                  type: string
                params:
                  description: Array of parameters
                  type: array
                  items:
                    type: object
                id:
                  description: Identifier established by the client
                  type: integer
                  example: 1
            examples:
              Build tx to authoriseDid:
                value:
                  jsonrpc: "2.0"
                  method: authoriseDid
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      senderDid: did:ebsi:zbM8cCuoBMFNLeQyLiVFyxw
                      authorisedDid: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      whiteList: "0x01"
                  id: 474
              Build tx to createDocument (using block timestamp):
                value:
                  jsonrpc: "2.0"
                  method: createDocument
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      documentHash: "0xcd299cdabd6299907c31f7cdf112830bda9e2d9f5d33c9fc75dd62caa6b9bd67"
                      documentMetadata: "0x74657374206d65746164617461"
                      didEbsiCreator: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                  id: 474
              Build tx to createDocument (using external timestamp):
                value:
                  jsonrpc: "2.0"
                  method: createDocument
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      documentHash: "0xcd299cdabd6299907c31f7cdf112830bda9e2d9f5d33c9fc75dd62caa6b9bd67"
                      documentMetadata: "0x74657374206d65746164617461"
                      didEbsiCreator: did:ebsi:z23eve8qDNzYuNVqfSaErpuJ
                      timestamp: "0x65b776cb"
                      timestampProof: "0x4d9f29fa5c0676e0888a3be59223609962c93b61c5c022d46812348aaae1b528"
                  id: 474
              Build tx to removeDocument:
                value:
                  jsonrpc: "2.0"
                  method: removeDocument
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      documentHash: "0xcd299cdabd6299907c31f7cdf112830bda9e2d9f5d33c9fc75dd62caa6b9bd67"
                  id: 474
              Build tx to grantAccess:
                value:
                  jsonrpc: "2.0"
                  method: grantAccess
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      documentHash: "0xcd299cdabd6299907c31f7cdf112830bda9e2d9f5d33c9fc75dd62caa6b9bd67"
                      grantedByAccount: "0x6469643a656273693a7a32336576653871444e7a59754e5671665361457270754a"
                      subjectAccount: "0x6469643a656273693a7a625a4e464d5863454e664161523137376e394d596738"
                      grantedByAccType: "0x00"
                      subjectAccType: "0x00"
                      permission: "0x01"
                  id: 474
              Build tx to revokeAccess:
                value:
                  jsonrpc: "2.0"
                  method: revokeAccess
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      documentHash: "0xcd299cdabd6299907c31f7cdf112830bda9e2d9f5d33c9fc75dd62caa6b9bd67"
                      revokedByAccount: "0x6469643a656273693a7a32336576653871444e7a59754e5671665361457270754a"
                      subjectAccount: "0x6469643a656273693a7a625a4e464d5863454e664161523137376e394d596738"
                      permission: "0x01"
                  id: 474
              Build tx to writeEvent (using block timestamp):
                value:
                  jsonrpc: "2.0"
                  method: writeEvent
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      eventParams:
                        - documentHash: "0xcd299cdabd6299907c31f7cdf112830bda9e2d9f5d33c9fc75dd62caa6b9bd67"
                          externalHash: "external hash"
                          sender: "0x6469643a656273693a7a663632756876615175555a747936734d787a39715656"
                          origin: origin
                          metadata: "test metadata"
                  id: 474
              Build tx to writeEvent (using external timestamp):
                value:
                  jsonrpc: "2.0"
                  method: writeEvent
                  params:
                    - from: "0xc9765eC58E49e6E386549CEAA34FB0d8bB69C320"
                      eventParams:
                        - documentHash: "0xcd299cdabd6299907c31f7cdf112830bda9e2d9f5d33c9fc75dd62caa6b9bd67"
                          externalHash: "external hash"
                          sender: "0x6469643a656273693a7a663632756876615175555a747936734d787a39715656"
                          origin: origin
                          metadata: "test metadata"
                      timestamp: "0x65b776cb"
                      timestampProof: "0x4d9f29fa5c0676e0888a3be59223609962c93b61c5c022d46812348aaae1b528"
                  id: 474
              Send Transaction:
                value:
                  jsonrpc: "2.0"
                  method: sendSignedTransaction
                  id: 1
                  params:
                    - protocol: eth
                      unsignedTransaction:
                        from: "0x89205A3A3b2A69De6Dbf7f01ED13B2108B2c43e7"
                        to: "0xFde86148db58f57787C06BeAf63a9c3f789357b3"
                        data: "0x0000..."
                        nonce: "0x00"
                        chainId: "0x1b3b"
                        gasLimit: "0x10000"
                        gasPrice: "0x00"
                        value: "0x00"
                      r: "0x..."
                      s: "0x..."
                      v: "0x..."
                      signedRawTransaction: "--- signed raw transaction ---"
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
              examples:
                Build tx:
                  value:
                    jsonrpc: "2.0"
                    id: 482
                    result:
                      from: "0x8445fC96e27ceB0d1794be16a1Ac8BF5D765AACB"
                      to: "0x823BBc0ceE3dE3B61AcfA0CEedb951AB9a013F05"
                      data: ""
                      value: "0x0"
                      nonce: "0xb1d3"
                      chainId: "0x181f"
                      gasLimit: "0x1000000"
                      gasPrice: "0x0"
                Send a transaction:
                  description: Sends a signed transaction to the blockchain.
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result: "0xe670ec64341771606e55d6b4ca35a1a6b75ee3d5145a99d05921026d1527331"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                Bad Request:
                  $ref: "#/components/examples/BadRequest"
components:
  schemas:
    ProblemDetails:
      title: Problem Details
      description: A [Problem Details](https://datatracker.ietf.org/doc/html/rfc7807) object.
      type: object
      x-examples:
        Not Enough Credit:
          type: https://example.com/probs/out-of-credit
          title: You do not have enough credit.
          detail: Your current balance is 30, but that costs 50.
          instance: /account/12345/msgs/abc
      properties:
        type:
          type: string
          format: uri
          description: |
            An absolute URI that identifies the problem type. When dereferenced, it SHOULD provide
            human-readable documentation for the problem type.
          default: about:blank
        title:
          type: string
          description: |
            A short summary of the problem type.
          example: Internal Server Error
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence of the problem.
          minimum: 400
          maximum: 600
          example: 500
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the problem.
          example: Connection timeout
        instance:
          type: string
          format: uri
          description: |
            An absolute URI that identifies the specific occurrence of the problem. It may or may
            not yield further information if dereferenced.
    Links:
      title: Links
      description: Links model used for pagination
      type: object
      properties:
        last:
          type: string
          description: URI of the last page
        prev:
          type: string
          description: URI of the previous page
        next:
          type: string
          description: URI of the next page
        first:
          type: string
          description: URI of the first page
    Document:
      title: Document
      description: Track and Trace Document
      type: object
      properties:
        metadata:
          description: Document's metadata
          type: string
        timestamp:
          description: Timestamp object
          type: object
          properties:
            datetime:
              type: string
              description: |
                The date and time, optionally from transaction input
            source:
              type: string
              description: |
                Defines how the datetime was resolved, enumerated options are "block" and "external"
            proof:
              type: string
              description: |
                Proof of the source. Either a block number or a hash of timestamp certificate
        creator:
          type: string
          description: The `did:key` or `did:ebsi` that created the document
    Document__deprecated:
      title: Document (deprecated)
      description: Track and Trace Document
      type: object
      properties:
        metadata:
          description: Document's metadata
          type: string
        timestamp:
          description: Timestamp object
          type: object
          properties:
            datetime:
              type: string
              description: |
                The date and time, optionally from transaction input
            source:
              type: string
              description: |
                Defines how the datetime was resolved, enumerated options are "block" and "external"
            proof:
              type: string
              description: |
                Proof of the source. Either a block number or a hash of timestamp certificate
        events:
          type: array
          description: List of event hashes. Only available when the "version" parameter is "deprecated".
          items:
            type: string
            description: Event hash
        creator:
          type: string
          description: The `did:key` or `did:ebsi` that created the document
    Event:
      title: Event
      description: Track and Trace Event
      type: object
      properties:
        metadata:
          description: Event's metadata
          type: string
        timestamp:
          description: Timestamp object
          type: object
          properties:
            datetime:
              type: string
              description: |
                The date and time, optionally from transaction input
            source:
              type: string
              description: |
                Defines how the datetime was resolved, enumerated options are "block" and "external"
            proof:
              type: string
              description: |
                Proof of the source. Either a block number or a hash of timestamp certificate
        sender:
          type: string
          description: |
            The `did:key` or `did:ebsi` that created the event
        origin:
          type: string
          description: |
            Most of the times empty field, while it may be a string containing company name, while
            it can also point into an Event. All assumed relations are external to the SC.
        hash:
          type: string
          description: Event hash
        externalHash:
          type: string
          description: Externally generated hash
    JsonRpcResponse:
      title: JSON-RPC Response
      type: object
      properties:
        jsonrpc:
          description: Must be exactly "2.0"
          type: string
        id:
          description: Same identifier established by the client in the call
          type: integer
        result:
          description: Result of the call
          oneOf:
            - type: object
            - type: string
  examples:
    BadRequest:
      value:
        title: Bad request
        status: 400
        detail: Bad request
    NotFound:
      value:
        title: Not found
        status: 404
        detail: Not found
    InternalError:
      value:
        title: Internal error
        status: 500
        detail: Internal error
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
  - url: http://localhost
    description: Local Computer Environment
  - url: https://api-test.ebsi.eu
    description: EBSI Test Environment
  - url: https://api-pilot.ebsi.eu
    description: EBSI Pilot Environment
  - url: https://api-conformance.ebsi.eu
    description: EBSI Conformance Environment

    longDescription: |
      The **European Blockchain Services Infrastructure (EBSI)** was born in
      2018 when **29 countries** (all EU members states, Norway and
      Liechtenstein) and the **EU Commission** joined forces to create the
      **European Blockchain Partnership (EBP)**.


      The EBP’s vision is to leverage blockchain to create cross-border services
      for public administrations, businesses, citizens and their ecosystems to
      verify information and make services trustworthy. As EBSI continues to
      evolve, so does its governance. The EUROPEUM-EDIC, a new legal entity, is
      currently in the process of taking over EBSI's governance and preparing it
      to go into production.


      As the first pan-European, public-driven blockchain initiative of its
      kind, at EBSI we tap into blockchain's tamper-evident, immutable and
      decentralised properties to support better public services for all Europe.
      The blockchain ledger can be used to store information in a trusted,
      decentralised way, allowing for new forms of verification, traceability
      and transparency for citizens.


      Business: What can you do with EBSI?


      Several domains and industries can benefit from using blockchain in their
      business processes. Here we introduce EBSI’s major Use Case families and
      domains, so you can find out how you can benefit from it.


      [++Discover
      more++](https://ec.europa.eu/digital-building-blocks/sites/display/EBSI/What+is+ebsi#what-ebsi-used-for)++


      ++Technology: How does it work?


      Every transaction recorded on the EBSI ledger follows the same path. Here
      we explain the way in which EBSI's APIs, Smart Contracts and ledger work
      together to provide trusted information to its users.


      [++Discover
      more++](https://ec.europa.eu/digital-building-blocks/sites/display/EBSI/What+is+ebsi#how-it-works)++


      ++Infrastructure: a pan-European network of nodes


      EBSI's infrastructure is decentralised: instead of a unique database,
      there are many synchronised copies hosted in our network of European
      nodes. This is what makes EBSI tamper-proof.


      [++Discover
      more++](https://ec.europa.eu/digital-building-blocks/sites/display/EBSI/What+is+ebsi#infrastructure)
    shortDescription: European Blockchain Services Infrastructure

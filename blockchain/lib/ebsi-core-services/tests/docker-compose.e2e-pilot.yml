services:
  # Start The Graph
  graph-node:
    image: graphprotocol/graph-node:v0.38.0
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    depends_on:
      ipfs:
        condition: service_started
      postgres:
        condition: service_started
      # besu:
      #   condition: service_healthy
      # - contracts-deployer (rather than "besu")
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "besu:https://api-pilot.ebsi.eu/ledger/v4/blockchains/besu"
      # JSON-RPC configuration for EVM chains — https://github.com/graphprotocol/graph-node/blob/master/docs/environment-variables.md#json-rpc-configuration-for-evm-chains
      ETHEREUM_POLLING_INTERVAL: 2000
      ETHEREUM_BLOCK_BATCH_SIZE: 5
      GRAPH_ETHEREUM_MAX_BLOCK_RANGE_SIZE: 500
      GRAPH_ETHEREUM_BLOCK_INGESTOR_MAX_CONCURRENT_JSON_RPC_CALLS_FOR_TXN_RECEIPTS: 500
      GRAPH_ETHEREUM_FETCH_TXN_RECEIPTS_IN_BATCHES: true
      # Miscellaneous — https://github.com/graphprotocol/graph-node/blob/master/docs/environment-variables.md#miscellaneous
      GRAPH_LOG: info
    healthcheck:
      test: "bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/8020; exit $?;'"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  ipfs:
    image: ipfs/kubo:v0.17.0
    ports:
      - "5001:5001"
    volumes:
      - ./data/ipfs:/data/ipfs:Z
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    command:
      [
        "postgres",
        "-cshared_preload_libraries=pg_stat_statements",
        "-cmax_connections=200",
      ]
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data:Z

  # Deploy subgraphs
  subgraphs-deployer:
    image: ebsi/subgraphs-deployer:${GIT_COMMIT}
    depends_on:
      graph-node:
        condition: service_healthy
    environment:
      - IPFS_URL=http://ipfs:5001
      - NODE_URL=http://graph-node:8020
      - DIDR_SC_V5_ADDRESS=0x76C8190D7422e5fa2A0190Bc2313bab0b2afEC78
      - DIDR_SC_V5_START_BLOCK=2676595
      - PROXY_FACTORY_SC_V1_ADDRESS=""
      - PROXY_FACTORY_SC_V1_START_BLOCK=0
      - PROXY_TEMPLATE_REGISTRY_SC_V1_ADDRESS=""
      - PROXY_TEMPLATE_REGISTRY_SC_V1_START_BLOCK=0
      - TPR_SC_V3_ADDRESS=0x81872fccf3AEDD94C00E643bC2967Bd7aC91CFEB
      - TPR_SC_V3_START_BLOCK=2676586
      - TSR_SC_V3_ADDRESS=0x4466A1C6Af1b6de0b44742BcEc0cb6E6B5E1370F
      - TSR_SC_V3_START_BLOCK=9788523
      - TIR_SC_V5_ADDRESS=0x5C87455c82617579A10AD39C2DB3e60E846E7266
      - TIR_SC_V5_START_BLOCK=2676607
      - TIMESTAMP_SC_V4_ADDRESS=0x8b7ddD28FdE20080A337Bff5badCa043163Bc3a3
      - TIMESTAMP_SC_V4_START_BLOCK=2676598
      - TNT_SC_V1_ADDRESS=0x5a2413Aee431Fa836905EF682D851e1Ba6CedbC4
      - TNT_SC_V1_START_BLOCK=4664765
      - ESTAT_SC_V1_ADDRESS=0x6a2cb21030Dc2f98611305310088c334D4dA0B00
      - ESTAT_SC_V1_START_BLOCK=9885049
